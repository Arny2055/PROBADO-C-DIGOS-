<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtesting Suite - El Gurú</title>
    <style>
        :root {
            --primary: #00d4ff;
            --danger: #ff4b4b;
            --success: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            text-align: center; 
            color: var(--primary);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 12px;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-load { background: var(--primary); color: #0f172a; }
        .btn-clear-server { background: var(--danger); color: white; }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .status { 
            font-size: 0.85em; 
            color: #94a3b8; 
            text-align: center; 
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #1e293b;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th { 
            background-color: #0f172a; 
            color: var(--primary);
            font-size: 0.9em;
            text-transform: uppercase;
        }

        tr:hover { background-color: rgba(255, 255, 255, 0.03); }

        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 10px;
            font-size: 0.75em;
        }

        .btn-delete:hover { background: var(--danger); color: white; }

        .msg-cell { 
            max-width: 450px; 
            word-wrap: break-word; 
            line-height: 1.5;
        }

        .empty-row { text-align: center; color: #64748b; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Backtesting Suite Telegram</h1>
    
    <div class="config-section">
        <input type="password" id="botToken" placeholder="Token del Bot (BotFather)" oninput="saveConfig()">
        <input type="text" id="chatId" placeholder="ID del Canal (ej: @canal)" oninput="saveConfig()">
        <button class="btn-load" onclick="fetchMessages()">Cargar Mensajes</button>
        <button class="btn-clear-server" onclick="clearTelegramQueue()">Limpiar Servidor</button>
    </div>

    <div id="statusText" class="status">Configuración cargada localmente.</div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th style="width: 20%;">Fecha</th>
                <th>Mensaje / Pronóstico</th>
                <th style="width: 10%;">ID</th>
                <th style="width: 10%;">Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="4" class="empty-row">Presiona "Cargar Mensajes" para comenzar.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Cargar configuración guardada al abrir la herramienta
    window.onload = function() {
        const savedToken = localStorage.getItem('tg_token');
        const savedChat = localStorage.getItem('tg_chatId');
        
        if(savedToken) document.getElementById('botToken').value = savedToken;
        if(savedChat) document.getElementById('chatId').value = savedChat;
    };

    // 2. Guardar automáticamente en el navegador cada vez que se escribe
    function saveConfig() {
        localStorage.setItem('tg_token', document.getElementById('botToken').value);
        localStorage.setItem('tg_chatId', document.getElementById('chatId').value);
    }

    // 3. Eliminar una fila individual de la tabla (Vista local)
    function deleteRow(btn) {
        const row = btn.closest('tr');
        row.remove();
    }

    // 4. Limpiar los mensajes del servidor de Telegram (Reset de Offset)
    async function clearTelegramQueue() {
        const token = document.getElementById('botToken').value;
        const status = document.getElementById('statusText');

        if(!token) return alert("Ingresa el Token primero.");

        status.innerText = "Limpiando cola de mensajes en el servidor...";
        status.style.color = "var(--danger)";

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                // Obtenemos el ID del último mensaje y le sumamos 1 para confirmar recepción
                const lastUpdateId = data.result[data.result.length - 1].update_id;
                await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}`);
                
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="empty-row">Servidor limpio. Los mensajes anteriores fueron ignorados.</td></tr>';
                status.innerText = "¡Servidor de Telegram vaciado con éxito!";
            } else {
                status.innerText = "No hay mensajes pendientes por limpiar en el servidor.";
            }
        } catch (error) {
            status.innerText = "Error al intentar limpiar el servidor.";
            console.error(error);
        }
    }

    // 5. Obtener los mensajes más recientes
    async function fetchMessages() {
        const token = document.getElementById('botToken').value;
        const status = document.getElementById('statusText');
        const tableBody = document.getElementById('tableBody');

        if(!token) return alert("Por favor ingresa el Token de BotFather.");

        status.innerText = "Consultando mensajes nuevos...";
        status.style.color = "var(--primary)";

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                tableBody.innerHTML = "";
                // Mostramos primero los más nuevos
                const updates = data.result.reverse(); 

                updates.forEach(item => {
                    const msg = item.channel_post || item.message;
                    
                    if(msg) {
                        const date = new Date(msg.date * 1000).toLocaleString('es-MX');
                        const text = msg.text || `<span style="color:#64748b; font-style:italic;">[Multimedia o Sin Texto]</span>`;
                        
                        const row = `<tr>
                            <td>${date}</td>
                            <td class="msg-cell">${text}</td>
                            <td>${msg.message_id}</td>
                            <td><button class="btn-delete" onclick="deleteRow(this)">Borrar</button></td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    }
                });
                status.innerText = `Se encontraron ${data.result.length} mensajes en la cola del servidor.`;
            } else {
                status.innerText = "No hay mensajes nuevos en el servidor.";
                tableBody.innerHTML = '<tr><td colspan="4" class="empty-row">Sin mensajes nuevos. Publica algo en el canal y vuelve a intentar.</td></tr>';
            }
        } catch (error) {
            status.innerText = "Error de conexión. Revisa el Token.";
            status.style.color = "var(--danger)";
        }
    }
</script>

</body>
</html>
