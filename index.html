<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poisson xG - El Gurú de las Apuestas</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --warning: #eab308;
            --danger: #f43f5e;
            --info: #06b6d4;
            --purple: #a855f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 40px 0;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 { text-align: center; color: var(--primary); font-weight: 300; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.9em; color: #94a3b8; margin-bottom: 20px; }

        .db-status {
            text-align: center;
            font-size: 0.8em;
            margin-bottom: 20px;
            color: var(--success);
            background: rgba(34, 197, 94, 0.1);
            padding: 5px;
            border-radius: 5px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #00ffcc;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 15px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.75em;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button, input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: #334155;
            color: white;
            border: 1px solid var(--border);
        }

        input:focus { outline: 1px solid var(--primary); }

        button {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .btn-danger { background: #450a0a; color: #f87171; font-size: 11px; margin-top: 30px;}

        .results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border-top: 3px solid var(--primary);
            transition: 0.3s;
        }

        .card:hover { background: rgba(255, 255, 255, 0.05); }

        .card h3 { margin-top: 0; color: var(--primary); font-size: 1.1em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .prob-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
        }

        .odd-container { text-align: right; }

        .odd-tag {
            font-size: 0.75em;
            color: #94a3b8;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .value-badge {
            font-size: 0.7em;
            color: var(--success);
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        .prob-bar {
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .fill { height: 100%; background: var(--primary); transition: width 0.5s; }
        
        .badge {
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
            text-align: center;
        }

        b { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 El Gurú de las Apuestas</h1>
    <div class="subtitle">Calculadora Poisson con Local Storage & Analizador de Valor</div>
    
    <div id="dbStatus" class="db-status">Partidos en memoria: 0</div>
    
    <textarea id="csvData" placeholder="Pega aquí los nuevos xG para actualizar la base de datos..."></textarea>
    
    <div class="controls">
        <button onclick="processData()">1. Actualizar Datos</button>
        <select id="leagueSelector" onchange="updateTeams()">
            <option value="">Selecciona Liga</option>
        </select>
        <button onclick="calculateEverything()" style="background: var(--success); border:none;">2. Calcular Pronóstico</button>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>Local</label>
            <select id="homeTeam"><option value="">Selecciona Local</option></select>
        </div>
        <div class="input-group">
            <label>Visitante</label>
            <select id="awayTeam"><option value="">Selecciona Visitante</option></select>
        </div>
        <div class="input-group">
            <label>Cuota de la Casa</label>
            <input type="number" id="bookieOdd" step="0.01" placeholder="Ej: 1.95">
        </div>
    </div>

    <div id="output" class="results"></div>

    <button class="btn-danger" onclick="clearDatabase()">Limpiar Base de Datos</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('guru_poisson_db')) || {};
    let processedIds = new Set(JSON.parse(localStorage.getItem('guru_ids')) || []);

    window.onload = () => {
        updateLeagueSelector();
        updateStatus();
    };

    function updateStatus() {
        document.getElementById('dbStatus').innerText = `Partidos únicos guardados: ${processedIds.size}`;
    }

    function processData() {
        const text = document.getElementById('csvData').value.trim();
        const lines = text.split('\n');
        if (lines.length < 2) return alert("Pega datos válidos");

        let newMatches = 0;
        lines.slice(1).forEach(line => {
            const cols = line.split('\t');
            if (cols.length < 13) return;
            const matchId = cols[0];
            if (processedIds.has(matchId)) return; 
            const league = `${cols[2]} - ${cols[3]}`; 
            const home = cols[5]; const away = cols[6];
            const xg = {
                ftH: parseFloat(cols[7]), ftA: parseFloat(cols[8]),
                h1H: parseFloat(cols[9]), h1A: parseFloat(cols[10]),
                h2H: parseFloat(cols[11]), h2A: parseFloat(cols[12])
            };
            if (!db[league]) db[league] = {};
            [home, away].forEach(t => {
                if (!db[league][t]) db[league][t] = { ft_gf: [], ft_gc: [], h1_gf: [], h1_gc: [], h2_gf: [], h2_gc: [] };
            });
            db[league][home].ft_gf.push(xg.ftH); db[league][home].ft_gc.push(xg.ftA);
            db[league][home].h1_gf.push(xg.h1H); db[league][home].h1_gc.push(xg.h1A);
            db[league][home].h2_gf.push(xg.h2H); db[league][home].h2_gc.push(xg.h2A);
            db[league][away].ft_gf.push(xg.ftA); db[league][away].ft_gc.push(xg.ftH);
            db[league][away].h1_gf.push(xg.h1A); db[league][away].h1_gc.push(xg.h1H);
            db[league][away].h2_gf.push(xg.h2A); db[league][away].h2_gc.push(xg.h2H);
            processedIds.add(matchId);
            newMatches++;
        });
        saveToLocal(); updateLeagueSelector(); updateStatus();
        document.getElementById('csvData').value = "";
        alert(`Se han añadido ${newMatches} partidos.`);
    }

    function saveToLocal() {
        localStorage.setItem('guru_poisson_db', JSON.stringify(db));
        localStorage.setItem('guru_ids', JSON.stringify(Array.from(processedIds)));
    }

    function updateLeagueSelector() {
        const selector = document.getElementById('leagueSelector');
        selector.innerHTML = '<option value="">Selecciona Liga</option>';
        Object.keys(db).sort().forEach(l => { selector.innerHTML += `<option value="${l}">${l}</option>`; });
    }

    function updateTeams() {
        const league = document.getElementById('leagueSelector').value;
        const hSelect = document.getElementById('homeTeam');
        const aSelect = document.getElementById('awayTeam');
        hSelect.innerHTML = ''; aSelect.innerHTML = '';
        if (db[league]) {
            Object.keys(db[league]).sort().forEach(team => {
                const opt = `<option value="${team}">${team}</option>`;
                hSelect.innerHTML += opt; aSelect.innerHTML += opt;
            });
        }
    }

    function clearDatabase() {
        if(confirm("¿Seguro que quieres borrar todo el historial?")) { localStorage.clear(); location.reload(); }
    }

    function factorial(n) { if (n === 0) return 1; let res = 1; for (let i = 2; i <= n; i++) res *= i; return res; }
    function poisson(k, lambda) { return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k); }

    function getProbabilities(lH, lA) {
        let pHome = 0, pAway = 0, pDraw = 0, pO25 = 0, pBTTS = 0;
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) {
                const p = poisson(i, lH) * poisson(j, lA);
                if (i > j) pHome += p; else if (j > i) pAway += p; else pDraw += p;
                if (i + j > 2.5) pO25 += p; if (i > 0 && j > 0) pBTTS += p;
            }
        }
        return { pHome, pAway, pDraw, pO25, pBTTS };
    }

    function calcHalfOvers(lH, lA) {
        const p0 = poisson(0, lH) * poisson(0, lA);
        const p1 = (poisson(1, lH) * poisson(0, lA)) + (poisson(0, lH) * poisson(1, lA));
        const o05 = 1 - p0;
        return { o05, o075: (o05 * 0.7) + ((1-p0-p1) * 0.3), o10: (o05 * 0.4) + ((1-p0-p1) * 0.6) };
    }

    function checkValue(myProb, bookieOdd) {
        if (!bookieOdd || bookieOdd <= 1) return "";
        const bookieProb = 1 / bookieOdd;
        if (myProb > bookieProb) {
            const edge = ((myProb - bookieProb) * 100).toFixed(1);
            return `<span class="value-badge">VALOR ENCONTRADO (+${edge}%)</span>`;
        }
        return "";
    }

    function calculateEverything() {
        const league = document.getElementById('leagueSelector').value;
        const t1 = document.getElementById('homeTeam').value;
        const t2 = document.getElementById('awayTeam').value;
        const bOdd = parseFloat(document.getElementById('bookieOdd').value);

        if (!t1 || !t2 || t1 === t2) return alert("Selecciona equipos válidos");

        const getAvg = (arr) => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0;
        const calcLambda = (teamH, teamA, type) => (getAvg(db[league][teamH][type + '_gf']) + getAvg(db[league][teamA][type + '_gc'])) / 2;

        const lFT_H = calcLambda(t1, t2, 'ft'); const lFT_A = calcLambda(t2, t1, 'ft');
        const l1H_H = calcLambda(t1, t2, 'h1'); const l1H_A = calcLambda(t2, t1, 'h1');
        const l2H_H = calcLambda(t1, t2, 'h2'); const l2H_A = calcLambda(t2, t1, 'h2');

        const ft = getProbabilities(lFT_H, lFT_A);
        const ht = calcHalfOvers(l1H_H, l1H_A);
        const st = calcHalfOvers(l2H_H, l2H_A);

        const toPct = (v) => (v * 100).toFixed(1) + '%';
        const toOdd = (v) => v > 0 ? (1 / v).toFixed(2) : 'N/A';

        document.getElementById('output').innerHTML = `
            <div class="card">
                <h3>1X2 & Valor</h3>
                <div class="prob-row"><span>Local (${t1})</span> <div class="odd-container"><b>${toPct(ft.pHome)}</b> <span class="odd-tag">@${toOdd(ft.pHome)}</span> ${checkValue(ft.pHome, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ft.pHome)}"></div></div>
                <div class="prob-row"><span>Empate</span> <div class="odd-container"><b>${toPct(ft.pDraw)}</b> <span class="odd-tag">@${toOdd(ft.pDraw)}</span> ${checkValue(ft.pDraw, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ft.pDraw)}; background:#64748b"></div></div>
                <div class="prob-row"><span>Visitante (${t2})</span> <div class="odd-container"><b>${toPct(ft.pAway)}</b> <span class="odd-tag">@${toOdd(ft.pAway)}</span> ${checkValue(ft.pAway, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ft.pAway)}; background:var(--danger)"></div></div>
            </div>

            <div class="card" style="border-top-color: var(--warning)">
                <h3>Goles FT & BTTS</h3>
                <div class="prob-row"><span>Over 2.5 FT</span> <div class="odd-container"><b style="color:var(--warning)">${toPct(ft.pO25)}</b> <span class="odd-tag">@${toOdd(ft.pO25)}</span> ${checkValue(ft.pO25, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ft.pO25)}; background:var(--warning)"></div></div>
                <div class="prob-row"><span>BTTS Yes</span> <div class="odd-container"><b style="color:var(--success)">${toPct(ft.pBTTS)}</b> <span class="odd-tag">@${toOdd(ft.pBTTS)}</span> ${checkValue(ft.pBTTS, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ft.pBTTS)}; background:var(--success)"></div></div>
                <div class="badge" style="margin-top:10px">Prom. xG FT: <b>${(lFT_H + lFT_A).toFixed(2)}</b></div>
            </div>

            <div class="card" style="border-top-color: var(--purple)">
                <h3>1er Tiempo (HT)</h3>
                <div class="prob-row"><span>Over 0.5 HT</span> <div class="odd-container"><b>${toPct(ht.o05)}</b> <span class="odd-tag">@${toOdd(ht.o05)}</span> ${checkValue(ht.o05, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(ht.o05)}; background:var(--purple)"></div></div>
                <div class="prob-row"><span>Over 0.75 HT</span> <b>${toPct(ht.o075)}</b> <span class="odd-tag">@${toOdd(ht.o075)}</span></div>
                <div class="prob-row"><span>Over 1.0 HT</span> <b>${toPct(ht.o10)}</b> <span class="odd-tag">@${toOdd(ht.o10)}</span></div>
            </div>

            <div class="card" style="border-top-color: var(--info)">
                <h3>2do Tiempo (2H)</h3>
                <div class="prob-row"><span>Over 0.5 2H</span> <div class="odd-container"><b>${toPct(st.o05)}</b> <span class="odd-tag">@${toOdd(st.o05)}</span> ${checkValue(st.o05, bOdd)}</div></div>
                <div class="prob-bar"><div class="fill" style="width:${toPct(st.o05)}; background:var(--info)"></div></div>
                <div class="prob-row"><span>Over 0.75 2H</span> <b>${toPct(st.o075)}</b> <span class="odd-tag">@${toOdd(st.o075)}</span></div>
                <div class="prob-row"><span>Over 1.0 2H</span> <b>${toPct(st.o10)}</b> <span class="odd-tag">@${toOdd(st.o10)}</span></div>
            </div>
        `;
    }
</script>

</body>
</html>
