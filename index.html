<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Backtest Analyzer - Visual Edge</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --verde: #2ecc71;
            --rojo: #e74c3c;
            --dark: #1a252f;
            --accent: #3498db;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            background: #0f172a;
            color: #2ecc71;
            border: 1px solid #334155;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            resize: vertical;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }
        .summary-item {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        .summary-item big { font-size: 28px; font-weight: 800; display: block; }
        .summary-item span { color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        
        .main-chart-container {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 12px;
        }
        .chart-mini { height: 250px; margin-top: 15px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
        .win { color: var(--verde); }
        .loss { color: var(--rojo); }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Backtest Dashboard</h1>
    <p class="subtitle">Analiza el rendimiento real y detecta patrones de profit</p>
    
    <textarea id="rawData" placeholder="Pega tus datos aquí..."></textarea>
    <button onclick="processData()">EJECUTAR ANÁLISIS DINÁMICO</button>

    <div id="results" style="display:none;">
        <div class="summary-box" id="generalSummary"></div>

        <div class="main-chart-container">
            <canvas id="equityChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Rentabilidad por Cuota (Odd)</h3>
                <canvas id="oddChart" class="chart-mini"></canvas>
            </div>
            <div class="card">
                <h3>Efectividad por Minuto de Alerta</h3>
                <canvas id="minuteChart" class="chart-mini"></canvas>
            </div>
            <div class="card">
                <h3>Profit por Día de la Semana</h3>
                <canvas id="dayChart" class="chart-mini"></canvas>
            </div>
            <div class="card">
                <h3>Top Ligas (Winrate %)</h3>
                <div id="leagueTable"></div>
            </div>
        </div>
    </div>
</div>

<script>
let charts = {};

function processData() {
    const text = document.getElementById('rawData').value.trim();
    if (!text) return;

    const rows = text.split('\n');
    let data = [];
    let cumulativeProfit = 0;
    let equityData = [0];

    rows.forEach(row => {
        const cols = row.split('\t');
        if (cols.length < 8 || cols[0].toLowerCase().includes('fecha')) return;

        const odd = parseFloat(cols[5].replace(',', '.'));
        const stake = parseFloat(cols[6]) || 1;
        const resultado = cols[7].toLowerCase().trim();
        const isWin = resultado === 'verde';

        // Calcular Profit
        const profit = isWin ? (stake * (odd - 1)) : -stake;
        cumulativeProfit += profit;
        equityData.push(parseFloat(cumulativeProfit.toFixed(2)));

        const dt = new Date(cols[0]);
        
        data.push({
            day: dt.toLocaleString('es-ES', { weekday: 'long' }),
            hour: dt.getHours(),
            minute: parseInt(cols[1]),
            league: cols[3],
            oddRange: getOddRange(odd),
            profit: profit,
            isWin: isWin
        });
    });

    renderDashboard(data, equityData);
}

function getOddRange(odd) {
    if (odd < 1.50) return '1.0-1.49';
    if (odd < 1.70) return '1.5-1.69';
    if (odd < 1.90) return '1.7-1.89';
    return '1.90+';
}

function renderDashboard(data, equity) {
    document.getElementById('results').style.display = 'block';
    
    // 1. Resumen General
    const wins = data.filter(d => d.isWin).length;
    const total = data.length;
    const profitTotal = equity[equity.length - 1];
    const yield = ((profitTotal / total) * 100).toFixed(2);

    document.getElementById('generalSummary').innerHTML = `
        <div class="summary-item"><span>Total Picks</span><big>${total}</big></div>
        <div class="summary-item"><span>Winrate</span><big>${((wins/total)*100).toFixed(1)}%</big></div>
        <div class="summary-item"><span>Profit Total</span><big class="${profitTotal>=0?'win':'loss'}">${profitTotal} u.</big></div>
        <div class="summary-item"><span>Yield</span><big>${yield}%</big></div>
    `;

    // 2. Gráfica de Equity (Curva de Beneficio)
    updateChart('equityChart', 'line', {
        labels: equity.map((_, i) => i),
        datasets: [{
            label: 'Profit Acumulado (Unidades)',
            data: equity,
            borderColor: '#2ecc71',
            backgroundColor: 'rgba(46, 204, 113, 0.1)',
            fill: true,
            tension: 0.3
        }]
    }, { maintainAspectRatio: false });

    // 3. Gráficas de Barras
    const oddStats = groupBy(data, 'oddRange');
    updateChart('oddChart', 'bar', {
        labels: Object.keys(oddStats),
        datasets: [{
            label: 'Winrate %',
            data: Object.keys(oddStats).map(k => (oddStats[k].w / (oddStats[k].w + oddStats[k].l) * 100).toFixed(1)),
            backgroundColor: '#3498db'
        }]
    });

    const dayStats = groupBy(data, 'day');
    updateChart('dayChart', 'polarArea', {
        labels: Object.keys(dayStats),
        datasets: [{
            data: Object.keys(dayStats).map(k => dayStats[k].profit.toFixed(2)),
            backgroundColor: ['#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#34495e']
        }]
    });

    const minStats = groupBy(data, 'minute');
    updateChart('minuteChart', 'bar', {
        labels: Object.keys(minStats).sort((a,b) => a-b),
        datasets: [{
            label: 'Profit por Minuto',
            data: Object.keys(minStats).sort((a,b) => a-b).map(k => minStats[k].profit.toFixed(2)),
            backgroundColor: '#f1c40f'
        }]
    });

    // 4. Tabla de Ligas
    const leagueStats = groupBy(data, 'league');
    let leagueHTML = `<table><thead><tr><th>Liga</th><th>Picks</th><th>Profit</th><th>WR</th></tr></thead><tbody>`;
    Object.keys(leagueStats)
        .sort((a,b) => leagueStats[b].profit - leagueStats[a].profit)
        .slice(0, 8)
        .forEach(l => {
            const s = leagueStats[l];
            leagueHTML += `<tr>
                <td>${l}</td>
                <td>${s.w + s.l}</td>
                <td class="${s.profit>=0?'win':'loss'}">${s.profit.toFixed(2)}</td>
                <td>${(s.w/(s.w+s.l)*100).toFixed(0)}%</td>
            </tr>`;
        });
    document.getElementById('leagueTable').innerHTML = leagueHTML + '</tbody></table>';
}

function groupBy(data, key) {
    return data.reduce((acc, obj) => {
        const val = obj[key];
        if (!acc[val]) acc[val] = { w: 0, l: 0, profit: 0 };
        obj.isWin ? acc[val].w++ : acc[val].l++;
        acc[val].profit += obj.profit;
        return acc;
    }, {});
}

function updateChart(id, type, data, options = {}) {
    if (charts[id]) charts[id].destroy();
    const ctx = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
        type: type,
        data: data,
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#fff' } } },
            scales: type !== 'polarArea' ? {
                y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
            } : {},
            ...options
        }
    });
}
</script>
</body>
</html>
