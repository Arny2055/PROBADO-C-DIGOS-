<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtesting Suite - El Gurú</title>
    <style>
        :root {
            --primary: #00d4ff;
            --danger: #ff4b4b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: var(--primary); }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 8px;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        .btn-delete {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 0.8em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { background-color: #334155; color: var(--primary); }

        tr:hover { background-color: #2d3748; }

        .status { font-size: 0.8em; color: #94a3b8; text-align: center; margin-bottom: 10px; }
        
        .msg-cell { max-width: 400px; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Mensajes Telegram</h1>
    
    <div class="config-section">
        <input type="password" id="botToken" placeholder="Token del Bot (BotFather)" oninput="saveConfig()">
        <input type="text" id="chatId" placeholder="Chat ID (ej: @mi_canal)" oninput="saveConfig()">
        <button onclick="fetchMessages()">Cargar Mensajes</button>
    </div>

    <div class="status" id="statusText">Datos cargados desde el almacenamiento local.</div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Mensaje / Pronóstico</th>
                <th>ID</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // 1. Cargar configuración al iniciar
    window.onload = function() {
        if(localStorage.getItem('tg_token')) {
            document.getElementById('botToken').value = localStorage.getItem('tg_token');
        }
        if(localStorage.getItem('tg_chatId')) {
            document.getElementById('chatId').value = localStorage.getItem('tg_chatId');
        }
    };

    // 2. Guardar automáticamente en LocalStorage
    function saveConfig() {
        const token = document.getElementById('botToken').value;
        const chat = document.getElementById('chatId').value;
        localStorage.setItem('tg_token', token);
        localStorage.setItem('tg_chatId', chat);
    }

    // 3. Eliminar fila de la tabla
    function deleteRow(btn) {
        const row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
    }

    // 4. Obtener mensajes de Telegram
    async function fetchMessages() {
        const token = document.getElementById('botToken').value;
        const chat = document.getElementById('chatId').value;
        const status = document.getElementById('statusText');
        const tableBody = document.getElementById('tableBody');

        if(!token || !chat) {
            alert("Por favor completa los campos de configuración.");
            return;
        }

        status.innerText = "Conectando con Telegram...";
        tableBody.innerHTML = "";

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                // Invertimos para ver los más recientes arriba
                const updates = data.result.reverse(); 

                updates.forEach(item => {
                    const msg = item.channel_post || item.message;
                    
                    // Verificamos que el mensaje pertenezca al chat id configurado
                    // (Opcional: puedes quitar la validación de ID para ver todo lo que llega al bot)
                    if(msg) {
                        const date = new Date(msg.date * 1000).toLocaleString();
                        const text = msg.text || "[Contenido Multimedia]";
                        
                        const row = `<tr>
                            <td>${date}</td>
                            <td class="msg-cell">${text}</td>
                            <td>${msg.message_id}</td>
                            <td><button class="btn-delete" onclick="deleteRow(this)">Borrar</button></td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    }
                });
                status.innerText = `Éxito: Se recuperaron ${data.result.length} eventos.`;
            } else {
                status.innerText = "No hay mensajes nuevos (Recuerda que el bot solo lee mensajes recientes).";
            }
        } catch (error) {
            status.innerText = "Error de conexión. Revisa el Token o la consola.";
            console.error(error);
        }
    }
</script>

</body>
</html>
