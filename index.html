<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BETTING QUANT ENGINE V7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:Arial;padding:20px}
textarea{width:100%;height:120px;background:#020617;color:#22c55e}
.card{background:#020617;padding:15px;margin:10px 0;border-radius:10px}
h2{color:#38bdf8}
</style>
</head>
<body>

<h1>🔥 BETTING QUANT ENGINE V7</h1>

<div class="card">
<textarea id="data"></textarea>
<button onclick="run()">ANALIZAR</button>
</div>

<div class="card" id="stats"></div>
<div class="card" id="ai"></div>

<canvas id="profit"></canvas>
<canvas id="drawdown"></canvas>

<script>

function run(){
const raw=document.getElementById("data").value.trim().split("\n");
let data=[];

for(let i=1;i<raw.length;i++){
let c=raw[i].split("\t");
if(c.length<8)continue;

let odd=parseFloat(c[5]);
let stake=parseFloat(c[6]);
if(odd<1.4||odd>3)continue;

let d=new Date(c[0]);
data.push({
liga:c[3],
min:parseInt(c[1]),
hora:d.getHours(),
odd:odd,
stake:stake,
res:c[7]=="verde"
});
}

if(data.length<20){
document.getElementById("ai").innerHTML="❌ Muestra insuficiente";
return;
}

let profit=0,curve=[0],dd=[],peak=0,maxDD=0;
let wins=0,staked=0;

let map={};

data.forEach(d=>{
let p=d.res?d.stake*(d.odd-1):-d.stake;

profit+=p;
staked+=d.stake;
if(d.res)wins++;

curve.push(profit);

if(profit>peak)peak=profit;
let draw=profit-peak;
dd.push(draw);
if(draw<maxDD)maxDD=draw;

let key=d.liga+"|"+d.min+"|"+d.hora;

if(!map[key]){
map[key]={p:0,s:0,w:0,n:0,odds:[]};
}

map[key].p+=p;
map[key].s+=d.stake;
map[key].n++;
map[key].odds.push(d.odd);
if(d.res)map[key].w++;
});

let combos=[];
let warn=[];

Object.keys(map).forEach(k=>{
let m=map[k];

if(m.n<10){
warn.push("⚠️ baja muestra "+k);
return;
}

let wr=m.w/m.n;
let avg=m.odds.reduce((a,b)=>a+b)/m.odds.length;

let EV=(wr*(avg-1))-(1-wr);
let edge=(wr*avg)-1;

if(m.p>0 && m.n<15) warn.push("❌ fake edge "+k);

if(EV>0.05){
combos.push({k,EV,p:m.p,n:m.n});
}
});

combos.sort((a,b)=>b.EV-a.EV);

let strat="";
let proj=0;

combos.slice(0,5).forEach(c=>{
let stake=1;
if(c.EV>0.1)stake=2;
else if(c.EV<0.05)stake=0.5;

proj+=c.p*stake;

strat+=`🔥 ${c.k} | EV ${c.EV.toFixed(2)} | Stake ${stake}U<br>`;
});

let wrTotal=wins/data.length;
let yield=(profit/staked)*100;

// sharpe simple
let avgR=profit/data.length;
let std=Math.sqrt(curve.reduce((a,b)=>a+Math.pow(b-avgR,2),0)/curve.length);
let sharpe=avgR/std;

document.getElementById("stats").innerHTML=`
Picks: ${data.length}<br>
WinRate: ${(wrTotal*100).toFixed(1)}%<br>
Profit: ${profit.toFixed(2)}U<br>
Yield: ${yield.toFixed(2)}%<br>
Drawdown: ${maxDD.toFixed(2)}U<br>
Sharpe: ${sharpe.toFixed(2)}
`;

document.getElementById("ai").innerHTML=`
<h2>🧠 IA V7</h2>
Combos válidos: ${combos.length}<br>
<br>
${strat}
<br>
💰 Profit proyectado: ${proj.toFixed(2)}U
<br><br>
${warn.slice(0,5).join("<br>")}
`;

new Chart(document.getElementById("profit"),{
type:"line",
data:{labels:curve.map((_,i)=>i),datasets:[{data:curve}]}
});

new Chart(document.getElementById("drawdown"),{
type:"line",
data:{labels:dd.map((_,i)=>i),datasets:[{data:dd}]}
});

}

</script>

</body>
</html>
