<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL GURÚ DE LAS APUESTAS - Backtesting Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #282a36;
            --current-line: #44475a;
            --fg: #f8f8f2;
            --comment: #6272a4;
            --cyan: #8be9fd;
            --green: #50fa7b;
            --orange: #ffb86c;
            --pink: #ff79c6;
            --purple: #bd93f9;
            --red: #ff5555;
            --yellow: #f1fa8c;
        }

        * { box-sizing: border-box; } /* Evita desbordamientos por padding */

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px; /* Reducido para móvil */
            overflow-x: hidden; /* Evita scroll horizontal parásito */
        }

        h1 { font-family: 'Fira Code', monospace; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; font-size: 1.4rem; }
        h3 { font-family: 'Fira Code', monospace; color: var(--purple); font-size: 1rem; margin-top: 0; }

        .container { max-width: 1400px; margin: auto; }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .card {
            background: var(--current-line);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--comment);
            margin-bottom: 15px;
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg);
            color: var(--green);
            border: 1px solid var(--purple);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            resize: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            border-bottom: 3px solid var(--purple);
        }

        .stat-box span { display: block; font-size: 0.7rem; color: var(--comment); }
        .stat-box b { font-size: 1.1rem; color: var(--cyan); }

        .filters {
            display: flex;
            flex-wrap: wrap; /* Para que bajen en iPhone */
            gap: 8px;
            margin-top: 10px;
        }

        .filters input, .filters select {
            flex: 1 1 140px; /* Tamaño mínimo antes de bajar */
            background: var(--bg);
            border: 1px solid var(--comment);
            color: var(--fg);
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .chart-main { height: 300px; }
        .chart-mini { height: 280px; }

        .grid-charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 450px;
        }

        th { background: var(--purple); color: var(--bg); padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid var(--current-line); }

        .status-win { color: var(--green); font-weight: bold; }
        .status-loss { color: var(--red); font-weight: bold; }

        .btn-clear {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        /* AJUSTES ESPECÍFICOS PARA IPHONE / MÓVIL */
        @media (max-width: 768px) {
            .grid-config, .grid-charts-row, .analysis-grid {
                grid-template-columns: 1fr;
            }
            body { padding: 10px; }
            h1 { font-size: 1.2rem; }
            .card { padding: 10px; }
            .chart-main, .chart-mini { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Backtesting Lab <span style="font-size: 10px; color: var(--comment);">GURÚ v2.1</span></h1>

    <div class="grid-config">
        <div class="card">
            <h3>⚙️ Config</h3>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <input type="number" id="bank-initial" value="1000" placeholder="Bank $" oninput="processData()">
                <input type="number" id="unit-value" value="10" placeholder="Unidad $" oninput="processData()">
            </div>
        </div>
        <div class="card">
            <h3>📋 Datos</h3>
            <textarea id="raw-data" placeholder="Pega aquí tu tabla..." oninput="processData()">
Fecha	Minuto	Evento	Liga	Mercado	Odd	Stake	Resultado
3/17/26 16:30	18'	Richmond Kickers x Northern Virginia	USA US Open Cup	Gol	1.61	1	verde
3/17/26 16:30	14'	Academia Puerto Cabello x UCV	Venezuela Primera Division	Gol	1.8	1	verde
3/17/26 13:45	14'	Horsham x Bath City	England Vanarama National League South	Gol	1.62	1	rojo
3/17/26 13:45	14'	Cheltenham Town x Crewe Alexandra	England League Two	Gol	1.7	1	rojo</textarea>
            <button class="btn-clear" onclick="clearData()">Limpiar Datos</button>
        </div>
    </div>

    <div class="card">
        <h3>🔍 Filtros Rápidos</h3>
        <div class="filters">
            <input type="text" id="filter-liga" placeholder="Liga..." oninput="processData()">
            <input type="number" id="filter-min-odd" step="0.1" placeholder="Cuota Mín" oninput="processData()">
            <select id="filter-day" onchange="processData()">
                <option value="">Todos los días</option>
                <option value="1">Lunes</option><option value="2">Martes</option><option value="3">Miércoles</option>
                <option value="4">Jueves</option><option value="5">Viernes</option><option value="6">Sábado</option>
                <option value="0">Domingo</option>
            </select>
            <input type="text" id="filter-minute-pick" placeholder="Minuto (ej. 14')" oninput="processData()">
        </div>
    </div>

    <div class="stats-grid" id="stats-output"></div>

    <div class="card chart-main">
        <h3>📈 Curva de Profit</h3>
        <canvas id="profitChart"></canvas>
    </div>

    <div class="grid-charts-row">
        <div class="card chart-mini">
            <h3>⏱️ Profit/Minuto</h3>
            <canvas id="minuteChart"></canvas>
        </div>
        <div class="card chart-mini">
            <h3>📅 Profit/Día</h3>
            <canvas id="dayChart"></canvas>
        </div>
    </div>

    <div class="card chart-mini">
        <h3>🕒 Profit/Hora</h3>
        <canvas id="hourChart"></canvas>
    </div>

    <div class="analysis-grid">
        <div class="card">
            <h3>⏱️ Análisis Minuto</h3>
            <div class="table-wrapper">
                <table id="minute-analysis-table">
                    <thead><tr><th>Min</th><th>Picks</th><th>%</th><th>Profit</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <h3>📊 Historial</h3>
            <div class="table-wrapper">
                <table id="results-table">
                    <thead><tr><th>Fecha</th><th>Min</th><th>Liga</th><th>Odd</th><th>Res</th><th>U</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let chartProfit, chartMinute, chartDay, chartHour;

    function erfc(x) {
        const z = Math.abs(x);
        const t = 1 / (1 + z / 2);
        const r = t * Math.exp(-z * z - 1.26551223 + t * (1.00002368 + t * (0.37409196 + t * (0.09678418 + t * (-0.18628806 + t * (0.27886807 + t * (-1.13520398 + t * (1.48851587 + t * (-0.82215223 + t * 0.17087277)))))))));
        return x >= 0 ? r : 2 - r;
    }

    function calculatePValue(winRate, n, avgOdd) {
        if (n <= 1 || avgOdd <= 1) return 100;
        const expectedWinRate = 1 / avgOdd;
        const sd = Math.sqrt((expectedWinRate * (1 - expectedWinRate)) / n);
        const z = (winRate - expectedWinRate) / sd;
        return (erfc(z / Math.sqrt(2)) / 2) * 100;
    }

    function clearData() {
        document.getElementById('raw-data').value = '';
        processData();
    }

    function processData() {
        const rawText = document.getElementById('raw-data').value;
        const lines = rawText.trim().split('\n');
        let data = [];
        let minuteMap = {};
        let dayStats = [0,0,0,0,0,0,0];
        let hourStats = Array(24).fill(0);

        const fL = document.getElementById('filter-liga').value.toLowerCase();
        const fMinO = parseFloat(document.getElementById('filter-min-odd').value) || 0;
        const fD = document.getElementById('filter-day').value;
        const fMinP = document.getElementById('filter-minute-pick').value;

        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split('\t');
            if(cols.length < 8) continue;
            const dateObj = new Date(cols[0].trim());
            const row = {
                fecha: cols[0].trim(),
                dia: isNaN(dateObj.getDay()) ? null : dateObj.getDay(),
                hora: isNaN(dateObj.getHours()) ? null : dateObj.getHours(),
                minuto: cols[1],
                minNum: parseInt(cols[1]) || 0,
                liga: cols[3],
                odd: parseFloat(cols[5]),
                stake: parseFloat(cols[6]) || 0,
                res: cols[7].trim().toLowerCase()
            };

            if (fL && !row.liga.toLowerCase().includes(fL)) continue;
            if (row.odd < fMinO) continue;
            if (fD !== "" && row.dia !== null && row.dia != fD) continue;
            if (fMinP && row.minuto !== fMinP) continue;

            data.push(row);
            let p = (row.res === 'verde') ? (row.stake * (row.odd - 1)) : -row.stake;

            if (!minuteMap[row.minuto]) minuteMap[row.minuto] = { p: 0, w: 0, pr: 0, n: row.minNum };
            minuteMap[row.minuto].p++;
            minuteMap[row.minuto].pr += p;
            if(row.res === 'verde') minuteMap[row.minuto].w++;
            if(row.dia !== null) dayStats[row.dia] += p;
            if(row.hora !== null) hourStats[row.hora] += p;
        }
        updateDashboard(data, minuteMap, dayStats, hourStats);
    }

    function updateDashboard(data, minuteMap, dayStats, hourStats) {
        let tp = data.length, wins = data.filter(d => d.res === 'verde').length;
        let wr = tp > 0 ? (wins / tp) * 100 : 0;
        let profitU = 0, totalS = 0, sumO = 0;
        let cData = [0];

        data.forEach(d => {
            sumO += d.odd; totalS += d.stake;
            let p = (d.res === 'verde') ? (d.stake * (d.odd - 1)) : -d.stake;
            profitU += p;
            cData.push(parseFloat(profitU.toFixed(2)));
        });

        const pV = calculatePValue(wr / 100, tp, sumO/tp);
        document.getElementById('stats-output').innerHTML = `
            <div class="stat-box"><span>Picks</span><b>${tp}</b></div>
            <div class="stat-box"><span>WinRate</span><b>${wr.toFixed(1)}%</b></div>
            <div class="stat-box"><span>Profit</span><b style="color:var(--green)">${profitU.toFixed(2)}U</b></div>
            <div class="stat-box"><span>P-Value</span><b>${pV.toFixed(1)}%</b></div>
        `;

        const bO = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

        if (chartProfit) chartProfit.destroy();
        chartProfit = new Chart(document.getElementById('profitChart'), { type: 'line', data: { labels: cData.map((_, i) => i), datasets: [{ data: cData, borderColor: '#bd93f9', fill: true, backgroundColor: 'rgba(189, 147, 249, 0.1)' }] }, options: bO });

        const sM = Object.keys(minuteMap).sort((a,b) => minuteMap[a].n - minuteMap[b].n);
        let cp = 0;
        if (chartMinute) chartMinute.destroy();
        chartMinute = new Chart(document.getElementById('minuteChart'), { type: 'line', data: { labels: sM, datasets: [{ data: sM.map(m => { cp += minuteMap[m].pr; return cp.toFixed(2); }), borderColor: '#ff79c6' }] }, options: bO });

        const dL = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
        const dV = [1, 2, 3, 4, 5, 6, 0].map(i => dayStats[i]);
        if (chartDay) chartDay.destroy();
        chartDay = new Chart(document.getElementById('dayChart'), { type: 'bar', data: { labels: dL, datasets: [{ data: dV, backgroundColor: dV.map(v => v >= 0 ? '#50fa7b' : '#ff5555') }] }, options: bO });

        if (chartHour) chartHour.destroy();
        chartHour = new Chart(document.getElementById('hourChart'), { type: 'bar', data: { labels: Array.from({length: 24}, (_, i) => i+'h'), datasets: [{ data: hourStats, backgroundColor: '#8be9fd' }] }, options: bO });

        document.querySelector('#minute-analysis-table tbody').innerHTML = Object.keys(minuteMap).sort((a,b) => minuteMap[b].pr - minuteMap[a].pr).map(m => `<tr><td>${m}</td><td>${minuteMap[m].p}</td><td>${((minuteMap[m].w/minuteMap[m].p)*100).toFixed(0)}%</td><td style="color:${minuteMap[m].pr>=0?'var(--green)':'var(--red)'}">${minuteMap[m].pr.toFixed(2)}</td></tr>`).join('');
        document.querySelector('#results-table tbody').innerHTML = data.map(d => { let p = (d.res === 'verde') ? (d.stake * (d.odd - 1)) : -d.stake; return `<tr><td>${d.fecha.split(' ')[0]}</td><td>${d.minuto}</td><td>${d.liga.substring(0,15)}</td><td>${d.odd}</td><td class="${d.res==='verde'?'status-win':'status-loss'}">${d.res[0].toUpperCase()}</td><td>${p.toFixed(1)}</td></tr>`; }).join('');
    }

    window.onload = processData;
</script>
</body>
</html>
