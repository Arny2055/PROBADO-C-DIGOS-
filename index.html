<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerPro Analytics AI - El Gurú Maestro</title>
    <style>
        :root {
            --primary: #00d4ff; --danger: #ff4b4b; --success: #10b981;
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155;
            --accent: #eab308;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 1600px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; overflow-x: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.8em; color: #94a3b8; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; color: var(--primary); }

        .config-section { 
            display: grid; grid-template-columns: 1fr 1fr 120px auto auto auto auto auto; gap: 10px; 
            margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; align-items: end;
        }
        .config-group { display: flex; flex-direction: column; gap: 5px; }
        .config-group label { font-size: 0.75em; color: var(--primary); font-weight: bold; }

        input, select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 5px; }
        button { border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        
        .btn-load { background: var(--primary); color: #0f172a; }
        .btn-analyze { background: var(--accent); color: #000; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; min-width: 1300px; }
        th { background: #0f172a; color: var(--primary); position: sticky; top: 0; padding: 10px; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; }
        
        .recommended-row { background: rgba(234, 179, 8, 0.12) !important; border-left: 4px solid var(--accent); }
        .badge-real { background: var(--accent); color: #000; padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 0.85em; display: inline-block; margin-top: 5px; }
        
        .win { color: var(--success); font-weight: bold; }
        .loss { color: var(--danger); font-weight: bold; }
        .data-hl { color: var(--primary); font-weight: bold; }
        .small-text { font-size: 0.85em; color: #64748b; display: block; }

        #analysisModal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card); margin: 5% auto; padding: 25px; border-radius: 15px;
            width: 80%; max-width: 900px; border: 1px solid var(--primary); max-height: 80vh; overflow-y: auto;
        }
        .close-modal { float: right; cursor: pointer; font-size: 24px; color: var(--danger); }
        .pattern-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        .pattern-item { background: #0f172a; padding: 12px; border-left: 3px solid var(--primary); border-radius: 5px; }
    </style>
</head>
<body>

<div id="analysisModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAnalysis()">&times;</span>
        <h2 style="color: var(--primary);">🎯 Inteligencia de Patrones: El Gurú</h2>
        <div id="analysisResults"></div>
    </div>
</div>

<div class="container">
    <h1>Estrategia Live: HT Goal Tracker Pro</h1>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Registros</h3><p id="stat-total">0</p></div>
        <div class="stat-card"><h3>Efectividad (Rango N)</h3><p id="stat-accuracy">0%</p></div>
        <div class="stat-card"><h3>Profit</h3><p id="stat-profit">0.00</p></div>
        <div class="stat-card"><h3>Yield</h3><p id="stat-yield">0%</p></div>
    </div>
    
    <div class="config-section">
        <div class="config-group">
            <label>TOKEN BOT</label>
            <input type="password" id="botToken" placeholder="Token" oninput="saveConfig()">
        </div>
        <div class="config-group">
            <label>ID CANAL</label>
            <input type="text" id="chatId" placeholder="ID" oninput="saveConfig()">
        </div>
        <div class="config-group">
            <label>BUSCAR EN ÚLTIMOS (N)</label>
            <input type="number" id="matchRange" value="50" min="5" max="500" oninput="saveConfig(); updateGlobalPatterns(); render();">
        </div>
        
        <button class="btn-load" onclick="fetchMessages()">Cargar Alertas</button>
        <button class="btn-analyze" onclick="analyzePatterns()">Analizar Patrones</button>
        <a href="apuestasreales.html"><button style="background:var(--accent); color:black">Apuestas Reales 🔥</button></a>
        <button style="background:var(--success);color:white" onclick="exportCSV()">CSV</button>
        <button style="background:var(--danger);color:white" onclick="clearData()">Reset</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>Fecha/Hora</th>
                <th>Partido/Liga</th>
                <th>Min</th>
                <th>AP (L5/L10)</th>
                <th>Córners</th>
                <th>Posesión</th>
                <th>Shots (On/Off)</th>
                <th>Heatmap</th>
                <th>% HT</th>
                <th>Cuota</th>
                <th>Resultado</th>
                <th>Profit</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cornerpro_db')) || [];
    // Valores base de patrones
    let currentBestPatterns = { min: 25, prob: 75, pos: 50, ap5: 1.0, corners: 3, shotsOn: 2 };

    window.onload = () => {
        document.getElementById('botToken').value = localStorage.getItem('tg_token') || '';
        document.getElementById('chatId').value = localStorage.getItem('tg_chatId') || '';
        document.getElementById('matchRange').value = localStorage.getItem('guru_range') || '50';
        updateGlobalPatterns();
        calculateStats();
        render();
    };

    function saveConfig() {
        localStorage.setItem('tg_token', document.getElementById('botToken').value);
        localStorage.setItem('tg_chatId', document.getElementById('chatId').value);
        localStorage.setItem('guru_range', document.getElementById('matchRange').value);
    }

    // --- MOTOR DE ANÁLISIS MULTIVARIABLE BASADO EN RANGO N ---
    function updateGlobalPatterns() {
        const range = parseInt(document.getElementById('matchRange').value) || 50;
        const recentSettled = db.filter(x => x.status !== 'PENDIENTE').slice(0, range);
        const wins = recentSettled.filter(x => x.status === 'WIN');
        
        if(wins.length >= 3) {
            // Promedio Minuto, Probabilidad y Posesión
            const avgMin = wins.reduce((s, x) => s + x.minuto, 0) / wins.length;
            const avgProb = wins.reduce((s, x) => s + x.probHT, 0) / wins.length;
            const avgPos = wins.reduce((s, x) => s + x.pos, 0) / wins.length;
            
            // Promedio Ataques Peligrosos L5
            const avgAp5 = wins.reduce((s, x) => s + (parseFloat(x.ap5) || 0), 0) / wins.length;
            
            // Promedio Córners Totales
            const avgCorners = wins.reduce((s, x) => {
                const c = x.corners.split('-').map(n => parseInt(n.trim()) || 0);
                return s + (c[0] + c[1]);
            }, 0) / wins.length;

            // Promedio Shots On Target
            const avgShotsOn = wins.reduce((s, x) => {
                const sh = x.son.split('-').map(n => parseInt(n.trim()) || 0);
                return s + (sh[0] + sh[1]);
            }, 0) / wins.length;

            currentBestPatterns = {
                min: Math.floor(avgMin),
                prob: Math.floor(avgProb - 2),
                pos: Math.floor(avgPos - 1),
                ap5: parseFloat(avgAp5.toFixed(1)),
                corners: Math.floor(avgCorners),
                shotsOn: Math.floor(avgShotsOn)
            };
        }
    }

    function parseAlert(text) {
        const get = (regex, index = 1) => { 
            const m = text.match(regex); 
            return m ? m[index].trim() : 'N/A'; 
        };
        return {
            partido: get(/Game: (.*?)\n/),
            liga: get(/🏆 League: (.*?)\n/),
            minuto: parseInt(get(/🕛 Time: (\d+)/)) || 0,
            ap: get(/⚔ Dangerous Attacks: (\d+ - \d+)/),
            ap5: get(/Last 5': ([\d. ]+)/),
            ap10: get(/Last 10': ([\d. ]+)/),
            corners: get(/⛳ Corners: (\d+ - \d+)/),
            pos: parseInt(get(/⚖ Possession: (\d+)/)) || 0,
            son: get(/🥅 Shots on: (\d+ - \d+)/),
            soff: get(/➡ Shots off: (\d+ - \d+)/),
            heatmap: get(/heatmapFull:(.*?)(?:\n|$)/),
            probHT: parseInt(get(/Medio Tiempo:(\d+)/)) || 0,
            cuota: parseFloat(get(/Goal Live Line Odd:([\d.]+)/)) || 1.60
        };
    }

    async function fetchMessages() {
        const token = document.getElementById('botToken').value;
        if(!token) return alert("Ingresa el Token del Bot");
        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await res.json();
            if (data.ok && data.result.length > 0) {
                data.result.reverse().forEach(item => {
                    const msg = item.channel_post || item.message;
                    if(msg && msg.text && !db.find(x => x.id === msg.message_id)) {
                        const info = parseAlert(msg.text);
                        if(info.partido !== 'N/A') {
                            db.unshift({
                                id: msg.message_id,
                                fecha: new Date(msg.date * 1000).toLocaleString('es-MX'),
                                ...info,
                                status: 'PENDIENTE',
                                profit: 0,
                                sentToReal: false
                            });
                        }
                    }
                });
                saveDB();
                const lastUpdateId = data.result[0].update_id;
                fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}`);
            }
        } catch (e) { console.error(e); }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        db.forEach((d, i) => {
            // Lógica de recomendación basada en el patrón actual del Gurú
            const c = d.corners.split('-').map(n => parseInt(n.trim()) || 0);
            const totalCorners = c[0] + c[1];
            
            const meetsCriteria = (d.probHT >= currentBestPatterns.prob) && 
                                  (d.pos >= currentBestPatterns.pos) &&
                                  (d.minuto >= currentBestPatterns.min) &&
                                  (parseFloat(d.ap5) >= currentBestPatterns.ap5);

            if(meetsCriteria && d.status === 'PENDIENTE' && !d.sentToReal) {
                let realBets = JSON.parse(localStorage.getItem('cornerpro_real_bets')) || [];
                if(!realBets.find(x => x.id === d.id)) {
                    realBets.unshift({...d});
                    localStorage.setItem('cornerpro_real_bets', JSON.stringify(realBets));
                }
                d.sentToReal = true;
            }

            tbody.innerHTML += `
                <tr class="${meetsCriteria ? 'recommended-row' : ''}">
                    <td class="small-text">${d.fecha}</td>
                    <td><b>${d.partido}</b><br><span class="small-text">${d.liga}</span></td>
                    <td class="data-hl">${d.minuto}'</td>
                    <td>L5: <span class="win">${d.ap5}</span><br>L10: ${d.ap10}</td>
                    <td>${d.corners}</td>
                    <td>${d.pos}%</td>
                    <td>${d.son} / ${d.soff}</td>
                    <td class="small-text">${d.heatmap}</td>
                    <td class="data-hl">${d.probHT}%</td>
                    <td>${d.cuota}</td>
                    <td>
                        <select onchange="setStatus(${i}, this.value)" style="background:#1e293b; color:${d.status === 'WIN' ? 'var(--success)' : (d.status === 'LOSS' ? 'var(--danger)' : 'white')}">
                            <option value="PENDIENTE" ${d.status === 'PENDIENTE' ? 'selected' : ''}>⏳</option>
                            <option value="WIN" ${d.status === 'WIN' ? 'selected' : ''}>WIN</option>
                            <option value="LOSS" ${d.status === 'LOSS' ? 'selected' : ''}>LOSS</option>
                        </select>
                    </td>
                    <td class="${d.profit > 0 ? 'win' : (d.profit < 0 ? 'loss' : '')}">${d.profit.toFixed(2)}</td>
                    <td><button onclick="deleteRow(${i})" style="background:none; color:var(--danger)">🗑</button></td>
                </tr>`;
        });
    }

    function setStatus(index, status) {
        const item = db[index];
        item.status = status;
        item.profit = status === 'WIN' ? (item.cuota - 1) : (status === 'LOSS' ? -1 : 0);
        
        // Sincronizar con apuestas reales si existe
        let realBets = JSON.parse(localStorage.getItem('cornerpro_real_bets')) || [];
        const rIdx = realBets.findIndex(x => x.id === item.id);
        if(rIdx !== -1) {
            realBets[rIdx].status = status;
            realBets[rIdx].profit = item.profit;
            localStorage.setItem('cornerpro_real_bets', JSON.stringify(realBets));
        }

        updateGlobalPatterns();
        saveDB();
    }

    function saveDB() {
        localStorage.setItem('cornerpro_db', JSON.stringify(db));
        calculateStats();
        render();
    }

    function calculateStats() {
        const range = parseInt(document.getElementById('matchRange').value) || 50;
        const settled = db.filter(x => x.status !== 'PENDIENTE').slice(0, range);
        const wins = settled.filter(x => x.status === 'WIN').length;
        const totalProfit = settled.reduce((acc, curr) => acc + curr.profit, 0);
        
        document.getElementById('stat-total').innerText = db.length;
        document.getElementById('stat-accuracy').innerText = settled.length ? ((wins/settled.length)*100).toFixed(1) + '%' : '0%';
        document.getElementById('stat-profit').innerText = totalProfit.toFixed(2);
        document.getElementById('stat-yield').innerText = settled.length ? ((totalProfit/settled.length)*100).toFixed(1) + '%' : '0%';
    }

    function analyzePatterns() {
        const range = document.getElementById('matchRange').value;
        const modal = document.getElementById('analysisModal');
        const results = document.getElementById('analysisResults');
        modal.style.display = 'block';
        
        results.innerHTML = `
            <div class="pattern-item" style="border-left-color:var(--accent); margin-bottom:15px;">
                <strong>Filtro de Rango:</strong> Buscando en los últimos <b>${range}</b> partidos finalizados.
            </div>
            <div class="pattern-grid">
                <div class="pattern-item"><strong>Minuto:</strong> ≥ ${currentBestPatterns.min}'</div>
                <div class="pattern-item"><strong>Prob. HT:</strong> ≥ ${currentBestPatterns.prob}%</div>
                <div class="pattern-item"><strong>Posesión:</strong> ≥ ${currentBestPatterns.pos}%</div>
                <div class="pattern-item"><strong>AP L5:</strong> ≥ ${currentBestPatterns.ap5}</div>
                <div class="pattern-item"><strong>Córners:</strong> ≥ ${currentBestPatterns.corners} totales</div>
                <div class="pattern-item"><strong>Shots On:</strong> ≥ ${currentBestPatterns.shotsOn}</div>
            </div>
            <p style="font-size: 0.8em; color: #94a3b8; margin-top: 15px;">* Estos valores son el promedio extraído exclusivamente de tus partidos marcados como <b>WIN</b> dentro del rango seleccionado.</p>
        `;
    }

    function closeAnalysis() { document.getElementById('analysisModal').style.display = 'none'; }
    function deleteRow(i) { if(confirm("¿Eliminar registro?")) { db.splice(i, 1); saveDB(); } }
    function clearData() { if(confirm("¿Reiniciar toda la base de datos?")) { db = []; localStorage.clear(); location.reload(); } }
    
    function exportCSV() {
        let csv = "Fecha,Partido,Liga,Min,AP5,Corners,Pos,ShotsOn,HT_Prob,Cuota,Status,Profit\n";
        db.forEach(d => {
            csv += `"${d.fecha}","${d.partido}","${d.liga}",${d.minuto},${d.ap5},"${d.corners}",${d.pos},"${d.son}",${d.probHT},${d.cuota},${d.status},${d.profit}\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Guru_Full_Analytics_N${document.getElementById('matchRange').value}.csv`);
        link.click();
    }
</script>
</body>
</html>
