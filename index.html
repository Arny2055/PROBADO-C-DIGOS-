<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL GURÚ DE LAS APUESTAS - Backtesting Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #282a36;
            --current-line: #44475a;
            --fg: #f8f8f2;
            --comment: #6272a4;
            --cyan: #8be9fd;
            --green: #50fa7b;
            --orange: #ffb86c;
            --pink: #ff79c6;
            --purple: #bd93f9;
            --red: #ff5555;
            --yellow: #f1fa8c;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1, h2 { font-family: 'Fira Code', monospace; color: var(--purple); text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1400px; margin: auto; }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--current-line);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--comment);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg);
            color: var(--green);
            border: 1px solid var(--purple);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            resize: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            border-bottom: 3px solid var(--purple);
        }

        .stat-box span { display: block; font-size: 0.8rem; color: var(--comment); }
        .stat-box b { font-size: 1.4rem; color: var(--cyan); }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        input, select {
            background: var(--bg);
            border: 1px solid var(--comment);
            color: var(--fg);
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: var(--pink); }

        .chart-container {
            height: 400px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        th { background: var(--purple); color: var(--bg); padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid var(--current-line); }
        tr:hover { background: rgba(255, 255, 255, 0.05); }

        .status-win { color: var(--green); font-weight: bold; }
        .status-loss { color: var(--red); font-weight: bold; }

        .btn-update {
            background: var(--pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-update:hover { background: var(--purple); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Backtesting Lab <span style="font-size: 12px; color: var(--comment);">supersónico</span></h1>

    <div class="grid-config">
        <div class="card">
            <h3>⚙️ Configuración</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label>Bank inicial ($):</label>
                <input type="number" id="bank-initial" value="1000" oninput="processData()">
                <label>Unidades por apuesta:</label>
                <input type="number" id="unit-size" value="1" oninput="processData()">
                <label>Valor de 1 Unidad ($):</label>
                <input type="number" id="unit-value" value="10" oninput="processData()">
            </div>
        </div>
        <div class="card">
            <h3>📋 Pegar Datos (Excel/Tab)</h3>
            <textarea id="raw-data" placeholder="Pega aquí tu tabla... (Fecha, Minuto, Evento, Liga, Mercado, Odd)" oninput="processData()">
Fecha	Minuto	Evento	Liga	Mercado	Odd
3/17/26 16:30	18'	Richmond Kickers x Northern Virginia	USA US Open Cup	Gol	1.61
3/17/26 16:30	14'	Academia Puerto Cabello x UCV	Venezuela Primera Division	Gol	1.8
3/17/26 14:00	24'	KH Hlidarendi x Hvíti riddarinn	Iceland Iceland Cup	Gol	1.61
3/17/26 14:00	14'	Barnsley x Wigan Athletic	England League One	Gol	1.6
3/17/26 13:45	14'	Salford City x Barrow	England League Two	Gol	1.65</textarea>
        </div>
    </div>

    <div class="card">
        <h3>🔍 Filtros Avanzados</h3>
        <div class="filters">
            <input type="text" id="filter-liga" placeholder="Filtrar Liga..." oninput="processData()">
            <input type="number" id="filter-min-odd" step="0.1" placeholder="Cuota Min" oninput="processData()">
            <input type="number" id="filter-max-odd" step="0.1" placeholder="Cuota Max" oninput="processData()">
            <select id="filter-day" onchange="processData()">
                <option value="">Cualquier día</option>
                <option value="1">Lunes</option>
                <option value="2">Martes</option>
                <option value="3">Miércoles</option>
                <option value="4">Jueves</option>
                <option value="5">Viernes</option>
                <option value="6">Sábado</option>
                <option value="0">Domingo</option>
            </select>
            <input type="text" id="filter-minute-pick" placeholder="Minuto exacto (ej. 14')" oninput="processData()">
        </div>
    </div>

    <div class="stats-grid" id="stats-output">
        </div>

    <div class="card chart-container">
        <canvas id="profitChart"></canvas>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h3>📊 Detalle de Picks</h3>
        <table id="results-table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Min</th>
                    <th>Evento</th>
                    <th>Liga</th>
                    <th>Cuota</th>
                    <th>Resultado</th>
                    <th>Profit (U)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let chart;

    function erfc(x) {
        const z = Math.abs(x);
        const t = 1 / (1 + z / 2);
        const r = t * Math.exp(-z * z - 1.26551223 + t * (1.00002368 + t * (0.37409196 + t * (0.09678418 + t * (-0.18628806 + t * (0.27886807 + t * (-1.13520398 + t * (1.48851587 + t * (-0.82215223 + t * 0.17087277)))))))));
        return x >= 0 ? r : 2 - r;
    }

    function calculatePValue(winRate, n, avgOdd) {
        if (n === 0) return 0;
        const expectedWinRate = 1 / avgOdd;
        const sd = Math.sqrt((expectedWinRate * (1 - expectedWinRate)) / n);
        const z = (winRate - expectedWinRate) / sd;
        return (erfc(z / Math.sqrt(2)) / 2) * 100;
    }

    function processData() {
        const rawText = document.getElementById('raw-data').value;
        const bankInitial = parseFloat(document.getElementById('bank-initial').value);
        const unitSize = parseFloat(document.getElementById('unit-size').value);
        const unitValue = parseFloat(document.getElementById('unit-value').value);

        const filterLiga = document.getElementById('filter-liga').value.toLowerCase();
        const filterMinOdd = parseFloat(document.getElementById('filter-min-odd').value) || 0;
        const filterMaxOdd = parseFloat(document.getElementById('filter-max-odd').value) || 999;
        const filterDay = document.getElementById('filter-day').value;
        const filterMinPick = document.getElementById('filter-minute-pick').value;

        const lines = rawText.trim().split('\n');
        let data = [];

        // Parsing de la tabla (Simulamos resultados para el backtesting ya que tu tabla no tiene Score)
        // REGLA: Usaremos un generador de resultados aleatorios para este demo, en una herramienta real 
        // añadirías una columna de "Resultado" (W/L)
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split('\t');
            if(cols.length < 6) continue;

            const dateObj = new Date(cols[0]);
            const row = {
                fecha: cols[0],
                diaSemana: dateObj.getDay(),
                minuto: cols[1],
                evento: cols[2],
                liga: cols[3],
                mercado: cols[4],
                odd: parseFloat(cols[5]),
                // Simulamos W/L basado en probabilidad de la cuota para mostrar funcionalidad
                win: Math.random() > (1 / parseFloat(cols[5])) ? false : true 
            };

            // Aplicar Filtros
            if (filterLiga && !row.liga.toLowerCase().includes(filterLiga)) continue;
            if (row.odd < filterMinOdd || row.odd > filterMaxOdd) continue;
            if (filterDay !== "" && row.diaSemana != filterDay) continue;
            if (filterMinPick && row.minuto !== filterMinPick) continue;

            data.push(row);
        }

        updateDashboard(data, bankInitial, unitSize, unitValue);
    }

    function updateDashboard(data, bankInitial, unitSize, unitValue) {
        let totalPicks = data.length;
        let wins = data.filter(d => d.win).length;
        let winRate = totalPicks > 0 ? (wins / totalPicks) * 100 : 0;
        
        let profitU = 0;
        let maxProfit = 0;
        let drawdown = 0;
        let chartData = [0];
        let totalStaked = totalPicks * unitSize;
        let sumOdds = 0;

        data.forEach(d => {
            sumOdds += d.odd;
            if(d.win) {
                profitU += (unitSize * (d.odd - 1));
            } else {
                profitU -= unitSize;
            }
            chartData.push(parseFloat(profitU.toFixed(2)));
            
            if (profitU > maxProfit) maxProfit = profitU;
            let currentDD = maxProfit - profitU;
            if (currentDD > drawdown) drawdown = currentDD;
        });

        let yieldVal = totalStaked > 0 ? (profitU / totalStaked) * 100 : 0;
        let avgOdd = totalPicks > 0 ? sumOdds / totalPicks : 0;
        let pValue = calculatePValue(winRate / 100, totalPicks, avgOdd);

        // Render Stats
        document.getElementById('stats-output').innerHTML = `
            <div class="stat-box"><span>Picks</span><b>${totalPicks}</b></div>
            <div class="stat-box"><span>Win Rate</span><b>${winRate.toFixed(1)}%</b></div>
            <div class="stat-box"><span>Profit</span><b style="color:var(--green)">${profitU.toFixed(2)}U</b></div>
            <div class="stat-box"><span>ROI (Bank)</span><b>${((profitU * unitValue / bankInitial) * 100).toFixed(1)}%</b></div>
            <div class="stat-box"><span>Yield</span><b>${yieldVal.toFixed(1)}%</b></div>
            <div class="stat-box"><span>Drawdown Máx</span><b style="color:var(--red)">${drawdown.toFixed(2)}U</b></div>
            <div class="stat-box"><span>P-Value</span><b>${pValue.toFixed(2)}%</b></div>
        `;

        // Render Chart
        if (chart) chart.destroy();
        const ctx = document.getElementById('profitChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.map((_, i) => i),
                datasets: [{
                    label: 'Profit Acumulado (Unidades)',
                    data: chartData,
                    borderColor: '#bd93f9',
                    backgroundColor: 'rgba(189, 147, 249, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#44475a' }, ticks: { color: '#f8f8f2' } },
                    x: { grid: { display: false }, ticks: { color: '#f8f8f2' } }
                },
                plugins: { legend: { labels: { color: '#f8f8f2' } } }
            }
        });

        // Render Table
        const tbody = document.querySelector('#results-table tbody');
        tbody.innerHTML = data.map(d => `
            <tr>
                <td>${d.fecha}</td>
                <td>${d.minuto}</td>
                <td>${d.evento}</td>
                <td>${d.liga}</td>
                <td>${d.odd.toFixed(2)}</td>
                <td class="${d.win ? 'status-win' : 'status-loss'}">${d.win ? 'WIN' : 'LOSS'}</td>
                <td>${d.win ? '+' + (unitSize * (d.odd - 1)).toFixed(2) : '-' + unitSize}</td>
            </tr>
        `).join('');
    }

    // Inicializar
    window.onload = processData;
</script>

</body>
</html>
