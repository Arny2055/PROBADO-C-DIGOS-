<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtesting Suite - El Gurú</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: var(--primary); }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 8px;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { background-color: #334155; color: var(--primary); }

        tr:hover { background-color: #2d3748; }

        .status { font-size: 0.8em; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Mensajes Telegram</h1>
    
    <div class="config-section">
        <input type="password" id="botToken" placeholder="Token del Bot (BotFather)">
        <input type="text" id="chatId" placeholder="Chat ID (ej: @mi_canal)">
        <button onclick="fetchMessages()">Cargar Mensajes</button>
    </div>

    <div class="status" id="statusText">Listo para importar datos.</div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Mensaje / Pronóstico</th>
                <th>ID Mensaje</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    async function fetchMessages() {
        const token = document.getElementById('botToken').value;
        const chat = document.getElementById('chatId').value;
        const status = document.getElementById('statusText');
        const tableBody = document.getElementById('tableBody');

        if(!token || !chat) {
            alert("Por favor completa los campos de configuración.");
            return;
        }

        status.innerText = "Conectando con Telegram...";
        tableBody.innerHTML = "";

        try {
            // Nota: Telegram Bot API no tiene un método directo para "leer historial" 
            // de forma masiva sin Webhooks, pero usamos getUpdates para capturar los nuevos.
            // Para leer mensajes antiguos, el bot debe recibir un mensaje o usar el método 
            // de polling mientras está activo.
            
            const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                // Filtrar solo los mensajes del canal/chat especificado
                const messages = data.result.reverse(); 

                messages.forEach(item => {
                    const msg = item.channel_post || item.message;
                    if(msg) {
                        const date = new Date(msg.date * 1000).toLocaleString();
                        const text = msg.text || "[Archivo/Imagen]";
                        
                        const row = `<tr>
                            <td>${date}</td>
                            <td>${text}</td>
                            <td>${msg.message_id}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    }
                });
                status.innerText = `Se encontraron ${data.result.length} eventos recientes.`;
            } else {
                status.innerText = "No se encontraron mensajes nuevos o el historial está vacío.";
            }
        } catch (error) {
            status.innerText = "Error de conexión. Revisa el Token.";
            console.error(error);
        }
    }
</script>

</body>
</html>
