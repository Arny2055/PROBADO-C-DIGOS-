<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Poisson Pro - FT & HT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-size: 12px; margin-bottom: 15px; resize: vertical; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        select, button { padding: 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #2980b9; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #7f8c8d; text-transform: uppercase; }
        .val { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .highlight { color: #e67e22; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        table th, table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        table th { background: #34495e; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Probabilidades Poisson</h2>
    
    <label>Pega aquí los datos de la tabla (incluyendo encabezados):</label>
    <textarea id="rawData" placeholder="Date	Time	HomeTeam	AwayTeam	FTHG	FTAG	HTHG	HTAG..."></textarea>
    
    <div class="controls">
        <select id="homeSelect"><option value="">Selecciona Local</option></select>
        <select id="awaySelect"><option value="">Selecciona Visitante</option></select>
    </div>
    
    <button onclick="calculate()">Calcular Pronóstico</button>

    <div id="statsInfo" style="margin-top:15px; font-size: 0.9em; color: #666;"></div>

    <div class="results-grid">
        <div class="card"><h3>xG Local (FT)</h3><div id="xgHome" class="val">-</div></div>
        <div class="card"><h3>xG Visita (FT)</h3><div id="xgAway" class="val">-</div></div>
        <div class="card"><h3>1 X 2 (%)</h3><div id="prob1x2" class="val">-</div></div>
        <div class="card"><h3>Over 2.5 FT</h3><div id="over25" class="val">-</div></div>
        <div class="card"><h3>BTTS Yes</h3><div id="btts" class="val">-</div></div>
        <div class="card"><h3>Over 0.5 HT</h3><div id="over05ht" class="val">-</div></div>
    </div>

    <div id="matrixContainer"></div>
</div>

<script>
let matches = [];
let teams = new Set();

// Cargar equipos al pegar datos
document.getElementById('rawData').addEventListener('input', function(e) {
    const text = e.target.value.trim();
    const rows = text.split('\n');
    const homeSelector = document.getElementById('homeSelect');
    const awaySelector = document.getElementById('awaySelect');
    
    matches = [];
    teams.clear();
    
    // Asumimos formato: Date, Time, HomeTeam, AwayTeam, FTHG, FTAG, HTHG, HTAG...
    for(let i = 1; i < rows.length; i++) {
        const cols = rows[i].split('\t');
        if(cols.length < 8) continue;
        
        const match = {
            home: cols[2].trim(),
            away: cols[3].trim(),
            fthg: parseInt(cols[4]),
            ftag: parseInt(cols[5]),
            hthg: parseInt(cols[6]),
            htag: parseInt(cols[7])
        };
        matches.push(match);
        teams.add(match.home);
        teams.add(match.away);
    }

    const sortedTeams = Array.from(teams).sort();
    homeSelector.innerHTML = awaySelector.innerHTML = '<option value="">Seleccionar...</option>';
    sortedTeams.forEach(t => {
        homeSelector.innerHTML += `<option value="${t}">${t}</option>`;
        awaySelector.innerHTML += `<option value="${t}">${t}</option>`;
    });
});

function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let res = 1;
    for (let i = 2; i <= n; i++) res *= i;
    return res;
}

function poisson(k, lambda) {
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
}

function calculate() {
    const homeTeam = document.getElementById('homeSelect').value;
    const awayTeam = document.getElementById('awaySelect').value;
    
    if(!homeTeam || !awayTeam || homeTeam === awayTeam) {
        alert("Selecciona dos equipos diferentes");
        return;
    }

    // 1. Promedios de la Liga
    let totalFTHG = 0, totalFTAG = 0, totalHTG = 0;
    matches.forEach(m => {
        totalFTHG += m.fthg;
        totalFTAG += m.ftag;
        totalHTG += (m.hthg + m.htag);
    });
    
    const avgHomeG = totalFTHG / matches.length;
    const avgAwayG = totalFTAG / matches.length;
    const avgHTG = totalHTG / matches.length;

    // 2. Fuerza de Equipos
    const getStats = (team) => {
        let hPlayed = 0, aPlayed = 0;
        let hScored = 0, hConceded = 0, aScored = 0, aConceded = 0;
        let htScoredTotal = 0;

        matches.forEach(m => {
            if(m.home === team) {
                hPlayed++; hScored += m.fthg; hConceded += m.ftag;
                htScoredTotal += (m.hthg + m.htag);
            }
            if(m.away === team) {
                aPlayed++; aScored += m.ftag; aConceded += m.fthg;
                htScoredTotal += (m.hthg + m.htag);
            }
        });

        return {
            attHome: (hScored / hPlayed) / avgHomeG,
            defHome: (hConceded / hPlayed) / avgAwayG,
            attAway: (aScored / aPlayed) / avgAwayG,
            defAway: (aConceded / aPlayed) / avgHomeG,
            avgHT: (htScoredTotal / (hPlayed + aPlayed))
        };
    };

    const homeStats = getStats(homeTeam);
    const awayStats = getStats(awayTeam);

    // 3. xG Final (Poisson Lambdas)
    const lambdaHome = homeStats.attHome * awayStats.defAway * avgHomeG;
    const lambdaAway = awayStats.attAway * homeStats.defHome * avgAwayG;
    const lambdaHT = (homeStats.avgHT + awayStats.avgHT) / 2; // Simplificación para HT

    document.getElementById('xgHome').innerText = lambdaHome.toFixed(2);
    document.getElementById('xgAway').innerText = lambdaAway.toFixed(2);

    // 4. Matriz de Probabilidades (hasta 6 goles)
    let probHomeWin = 0, probDraw = 0, probAwayWin = 0;
    let probOver25 = 0, probBTTS = 0;
    
    for(let h = 0; h <= 8; h++) {
        for(let a = 0; a <= 8; a++) {
            const p = poisson(h, lambdaHome) * poisson(a, lambdaAway);
            
            if(h > a) probHomeWin += p;
            else if(h === a) probDraw += p;
            else probAwayWin += p;

            if(h + a > 2.5) probOver25 += p;
            if(h > 0 && a > 0) probBTTS += p;
        }
    }

    // Probabilidad Over 0.5 HT (1 - Probabilidad de 0-0)
    // Usando el promedio de goles HT de la liga y equipos
    const prob00HT = Math.exp(-lambdaHT);
    const probOver05HT = 1 - prob00HT;

    // Mostrar Resultados
    document.getElementById('prob1x2').innerHTML = 
        `<span style="color:green">${(probHomeWin*100).toFixed(1)}%</span> | 
         <span style="color:gray">${(probDraw*100).toFixed(1)}%</span> | 
         <span style="color:red">${(probAwayWin*100).toFixed(1)}%</span>`;
    
    document.getElementById('over25').innerText = (probOver25 * 100).toFixed(1) + "%";
    document.getElementById('btts').innerText = (probBTTS * 100).toFixed(1) + "%";
    document.getElementById('over05ht').innerText = (probOver05HT * 100).toFixed(1) + "%";

    document.getElementById('statsInfo').innerText = `Basado en ${matches.length} partidos analizados.`;
}
</script>

</body>
</html>
