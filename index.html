<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Gurú de las Apuestas - Poisson Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { text-align: center; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .results {
            margin-top: 25px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 15px;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }

        .ai-verdict {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }

        .bet-yes { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
        .bet-no { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }
        
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: var(--secondary); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1>EL GURÚ DE LAS APUESTAS</h1>
    
    <div class="grid">
        <div class="col">
            <h3>Local</h3>
            <div class="input-group">
                <label>Avg Shots Favor</label>
                <input type="number" id="lShots" step="0.01" placeholder="5.80">
            </div>
            <div class="input-group">
                <label>Shots Per Goal</label>
                <input type="number" id="lEff" step="0.01" placeholder="2.64">
            </div>
        </div>
        <div class="col">
            <h3>Visitante</h3>
            <div class="input-group">
                <label>Avg Shots Favor</label>
                <input type="number" id="vShots" step="0.01" placeholder="0.70">
            </div>
            <div class="input-group">
                <label>Shots Per Goal</label>
                <input type="number" id="vEff" step="0.01" placeholder="0.88">
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="input-group">
            <label>Cuota Over 2.5</label>
            <input type="number" id="oddsOver" step="0.01" placeholder="1.80">
        </div>
        <div class="input-group">
            <label>Cuota BTTS Si</label>
            <input type="number" id="oddsBtts" step="0.01" placeholder="1.95">
        </div>
    </div>

    <button onclick="calculate()">Analizar con Poisson</button>

    <div id="resultsArea" class="results">
        <div class="result-item"><span>Exp. Goles Local:</span> <span id="resLambL">-</span></div>
        <div class="result-item"><span>Exp. Goles Vis:</span> <span id="resLambV">-</span></div>
        <div class="result-item"><span>Prob. Over 2.5:</span> <span id="resOverP">-</span></div>
        <div class="result-item"><span>Prob. BTTS Si:</span> <span id="resBttsP">-</span></div>
        
        <div id="verdictOver" class="ai-verdict"></div>
        <div id="verdictBtts" class="ai-verdict"></div>
    </div>
</div>

<script>
    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function factorial(n) {
        if (n === 0) return 1;
        let res = 1;
        for (let i = 1; i <= n; i++) res *= i;
        return res;
    }

    function calculate() {
        const lS = parseFloat(document.getElementById('lShots').value);
        const lE = parseFloat(document.getElementById('lEff').value);
        const vS = parseFloat(document.getElementById('vShots').value);
        const vE = parseFloat(document.getElementById('vEff').value);
        
        if(!lS || !lE || !vS || !vE) return alert("Llena todos los campos técnicos");

        const lambL = lS / lE;
        const lambV = vS / vE;

        // Probabilidades base
        const pL0 = poisson(0, lambL);
        const pL1 = poisson(1, lambL);
        const pL2 = poisson(2, lambL);
        
        const pV0 = poisson(0, lambV);
        const pV1 = poisson(1, lambV);
        const pV2 = poisson(2, lambV);

        // Under 2.5
        const p00 = pL0 * pV0;
        const p10 = pL1 * pV0;
        const p01 = pL0 * pV1;
        const p20 = pL2 * pV0;
        const p02 = pL0 * pV2;
        const p11 = pL1 * pV1;
        
        const probUnder = p00 + p10 + p01 + p20 + p02 + p11;
        const probOver = 1 - probUnder;

        // BTTS
        const probBtts = (1 - pL0) * (1 - pV0);

        // UI Updates
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('resLambL').innerText = lambL.toFixed(2);
        document.getElementById('resLambV').innerText = lambV.toFixed(2);
        document.getElementById('resOverP').innerText = (probOver * 100).toFixed(2) + "%";
        document.getElementById('resBttsP').innerText = (probBtts * 100).toFixed(2) + "%";

        generateVerdict('Over', probOver, 'oddsOver', 'verdictOver');
        generateVerdict('BTTS', probBtts, 'oddsBtts', 'verdictBtts');
    }

    function generateVerdict(market, prob, inputId, divId) {
        const userOdds = parseFloat(document.getElementById(inputId).value);
        const div = document.getElementById(divId);
        
        if(!userOdds) { div.style.display = 'none'; return; }
        div.style.display = 'block';

        const fairOdds = 1 / prob;
        const edge = userOdds / fairOdds;

        if (edge > 1.02) {
            let stake = 0.5;
            if (edge > 1.10) stake = 1.5;
            else if (edge > 1.05) stake = 1;
            
            div.className = 'ai-verdict bet-yes';
            div.innerHTML = `ANÁLISIS ${market}: ENTRAR <br> <small>Stake sugerido: ${stake} | Ventaja: ${((edge-1)*100).toFixed(1)}%</small>`;
        } else {
            div.className = 'ai-verdict bet-no';
            div.innerHTML = `ANÁLISIS ${market}: SIN VALOR <br> <small>Cuota mínima recomendada: ${fairOdds.toFixed(2)}</small>`;
        }
    }
</script>

</body>
</html>
