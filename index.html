<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Profit Backtester - Sniper Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --verde: #00f2fe;
            --verde-soft: rgba(0, 242, 254, 0.2);
            --rojo: #ff5470;
            --rojo-soft: rgba(255, 84, 112, 0.2);
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #7928ca;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: var(--bg);
            padding: 20px;
        }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        .header h1 { margin: 0; background: linear-gradient(90deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5em; }

        textarea {
            width: 100%;
            height: 100px;
            background: #0d1117;
            color: #58a6ff;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7928ca, #ff0080);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.01); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            text-align: center;
        }
        .stat-card small { color: #8b949e; text-transform: uppercase; font-size: 0.8em; }
        .stat-card div { font-size: 1.8em; font-weight: bold; margin-top: 5px; }

        .charts-main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-box {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .stats-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th { text-align: left; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        
        .val-profit { color: var(--verde); font-weight: bold; }
        .val-loss { color: var(--rojo); font-weight: bold; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.8em; background: #30363d; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PROFIT ANALYZER 2026</h1>
        <p>Donde los datos se convierten en dinero</p>
    </div>

    <textarea id="rawData" placeholder="Pega aquí los datos de Excel o de la herramienta..."></textarea>
    <button onclick="runAnalysis()">ANALIZAR PROFIT POR FILTRO</button>

    <div id="dashboard" style="display:none;">
        <div class="summary-grid" id="mainSummary"></div>

        <div class="charts-main">
            <div class="chart-box">
                <h3>Curva de Crecimiento (Unidades de Profit)</h3>
                <canvas id="equityChart" style="height: 300px;"></canvas>
            </div>
            <div class="chart-box">
                <h3>Profit por Rango de Cuota</h3>
                <canvas id="oddProfitChart"></canvas>
            </div>
        </div>

        <div class="stats-details">
            <div class="chart-box">
                <h3>Profit por Minuto de Alerta</h3>
                <canvas id="minProfitChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Profit por Día de la Semana</h3>
                <canvas id="dayProfitChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Profit por Hora del Día</h3>
                <canvas id="hourProfitChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Filtro por Liga (Top 10 Profit)</h3>
                <div id="leagueTable"></div>
            </div>
        </div>
    </div>
</div>

<script>
let activeCharts = {};

function runAnalysis() {
    const raw = document.getElementById('rawData').value.trim();
    if(!raw) return;

    const lines = raw.split('\n');
    let db = [];
    let curProfit = 0;
    let equityHistory = [0];

    lines.forEach(line => {
        const c = line.split('\t');
        if(c.length < 8 || c[0].toLowerCase().includes('fecha')) return;

        const odd = parseFloat(c[5].replace(',', '.'));
        const isWin = c[7].toLowerCase().trim() === 'verde';
        const profit = isWin ? (odd - 1) : -1;
        
        const dt = new Date(c[0]);
        const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

        db.push({
            month: dt.toLocaleString('es-ES', { month: 'long' }),
            day: dayNames[dt.getDay()],
            hour: dt.getHours() + ':00',
            min: parseInt(c[1]),
            league: c[3],
            oddRange: getRange(odd),
            profit: profit,
            win: isWin
        });

        curProfit += profit;
        equityHistory.push(parseFloat(curProfit.toFixed(2)));
    });

    render(db, equityHistory);
}

function getRange(o) {
    if(o < 1.60) return '1.0 - 1.59';
    if(o < 1.70) return '1.6 - 1.69';
    if(o < 1.80) return '1.7 - 1.79';
    return '1.80+';
}

function render(db, equity) {
    document.getElementById('dashboard').style.display = 'block';

    // Resumen
    const totalP = equity[equity.length - 1];
    const wins = db.filter(x => x.win).length;
    document.getElementById('mainSummary').innerHTML = `
        <div class="stat-card"><small>Profit Total</small><div class="${totalP>=0?'val-profit':'val-loss'}">${totalP.toFixed(2)} u.</div></div>
        <div class="stat-card"><small>Yield</small><div>${((totalP/db.length)*100).toFixed(1)}%</div></div>
        <div class="stat-card"><small>Winrate</small><div>${((wins/db.length)*100).toFixed(1)}%</div></div>
        <div class="stat-card"><small>Picks Analizados</small><div>${db.length}</div></div>
    `;

    // Gráfica de Línea (Equity)
    updateChart('equityChart', 'line', equity.map((v, i) => i), equity, 'Profit Acumulado', true);

    // Agrupaciones de Profit
    const oddData = groupProfit(db, 'oddRange');
    updateChart('oddProfitChart', 'bar', Object.keys(oddData), Object.values(oddData), 'Profit por Cuota');

    const minData = groupProfit(db, 'min');
    updateChart('minProfitChart', 'bar', Object.keys(minData), Object.values(minData), 'Profit por Minuto');

    const dayData = groupProfit(db, 'day');
    updateChart('dayProfitChart', 'bar', Object.keys(dayData), Object.values(dayData), 'Profit por Día');

    const hourData = groupProfit(db, 'hour');
    updateChart('hourProfitChart', 'bar', Object.keys(hourData).sort(), Object.values(hourData), 'Profit por Hora');

    // Tabla de Ligas
    const lData = groupProfit(db, 'league');
    const sortedLeagues = Object.keys(lData).sort((a,b) => lData[b] - lData[a]).slice(0, 10);
    let html = `<table><tr><th>Liga</th><th>Net Profit</th></tr>`;
    sortedLeagues.forEach(l => {
        html += `<tr><td>${l}</td><td class="${lData[l]>=0?'val-profit':'val-loss'}">${lData[l].toFixed(2)} u.</td></tr>`;
    });
    document.getElementById('leagueTable').innerHTML = html + `</table>`;
}

function groupProfit(data, key) {
    let res = {};
    data.forEach(item => {
        let k = item[key];
        res[k] = (res[k] || 0) + item.profit;
    });
    return res;
}

function updateChart(id, type, labels, data, label, isEquity = false) {
    if(activeCharts[id]) activeCharts[id].destroy();
    const ctx = document.getElementById(id).getContext('2d');
    
    activeCharts[id] = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                borderColor: '#00f2fe',
                backgroundColor: data.map(v => v >= 0 ? 'rgba(0, 242, 254, 0.5)' : 'rgba(255, 84, 112, 0.5)'),
                fill: isEquity,
                tension: 0.3,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                x: { grid: { display: false }, ticks: { color: '#8b949e' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}
</script>
</body>
</html>
