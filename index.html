<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CornerPro Analytics AI - El Gurú</title>
    <style>
        :root {
            --primary: #00d4ff; --danger: #ff4b4b; --success: #10b981;
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155;
            --accent: #eab308;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 1600px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; overflow-x: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.8em; color: #94a3b8; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; color: var(--primary); }

        .config-section { 
            display: grid; grid-template-columns: 1fr 1fr auto auto auto auto; gap: 10px; 
            margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px;
        }
        input, select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 5px; }
        button { border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        
        .btn-load { background: var(--primary); color: #0f172a; }
        .btn-analyze { background: var(--accent); color: #000; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; min-width: 1200px; }
        th { background: #0f172a; color: var(--primary); position: sticky; top: 0; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; }
        
        /* Estilo para Fila Recomendada */
        .recommended-row { background: rgba(234, 179, 8, 0.1) !important; border-left: 4px solid var(--accent); }
        .badge-real { background: var(--accent); color: #000; padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 0.85em; display: inline-block; margin-top: 5px; }

        .win { color: var(--success); font-weight: bold; }
        .loss { color: var(--danger); font-weight: bold; }
        .data-hl { color: var(--primary); font-weight: bold; }
        .small-text { font-size: 0.85em; color: #64748b; display: block; }

        #analysisModal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card); margin: 5% auto; padding: 25px; border-radius: 15px;
            width: 80%; max-width: 800px; border: 1px solid var(--primary); max-height: 80vh; overflow-y: auto;
        }
        .pattern-item { background: #0f172a; padding: 15px; border-left: 4px solid var(--primary); margin-bottom: 10px; border-radius: 5px; }
        .close-modal { float: right; cursor: pointer; font-size: 24px; color: var(--danger); }
    </style>
</head>
<body>

<div id="analysisModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAnalysis()">&times;</span>
        <h2 style="color: var(--primary);">🎯 Inteligencia de Patrones</h2>
        <div id="analysisResults"></div>
    </div>
</div>

<div class="container">
    <h1>Estrategia Live: HT Goal Tracker Pro</h1>

    <div class="stats-grid">
        <div class="stat-card"><h3>Picks</h3><p id="stat-total">0</p></div>
        <div class="stat-card"><h3>Efectividad</h3><p id="stat-accuracy">0%</p></div>
        <div class="stat-card"><h3>Profit (u)</h3><p id="stat-profit">0.00</p></div>
        <div class="stat-card"><h3>Yield</h3><p id="stat-yield">0%</p></div>
    </div>
    
    <div class="config-section">
        <input type="password" id="botToken" placeholder="Token Bot" oninput="saveConfig()">
        <input type="text" id="chatId" placeholder="ID Canal" oninput="saveConfig()">
        <button class="btn-load" onclick="fetchMessages()">Cargar Alertas</button>
        <button class="btn-analyze" onclick="analyzePatterns()">Ver Análisis</button>
        <button style="background:var(--success);color:white" onclick="exportCSV()">CSV</button>
        <button style="background:var(--danger);color:white" onclick="clearData()">Reset</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Partido/Liga</th>
                <th>Min</th>
                <th>AP (L/V)</th>
                <th>Córners</th>
                <th>Posesión</th>
                <th>Shots (O/O)</th>
                <th>% HT</th>
                <th>Cuota</th>
                <th>Resultado</th>
                <th>Profit</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cornerpro_db')) || [];
    let currentBestPatterns = { min: 25, prob: 80, pos: 55 };

    window.onload = () => {
        document.getElementById('botToken').value = localStorage.getItem('tg_token') || '';
        document.getElementById('chatId').value = localStorage.getItem('tg_chatId') || '';
        updateGlobalPatterns();
        calculateStats();
        render();
    };

    function saveConfig() {
        localStorage.setItem('tg_token', document.getElementById('botToken').value);
        localStorage.setItem('tg_chatId', document.getElementById('chatId').value);
    }

    // --- ACTUALIZA PATRONES EN SEGUNDO PLANO ---
    function updateGlobalPatterns() {
        const wins = db.filter(x => x.status === 'WIN');
        if(wins.length > 3) {
            currentBestPatterns.min = wins.reduce((s, x) => s + x.minuto, 0) / wins.length;
            currentBestPatterns.prob = 80; // Umbral base
            currentBestPatterns.pos = 54;  // Umbral base
        }
    }

    function parseAlert(text) {
        const get = (regex, index = 1) => { const m = text.match(regex); return m ? m[index] : '0'; };
        return {
            partido: get(/🏟 Game: (.*?)\n/),
            liga: get(/🏆 League: (.*?)\n/),
            minuto: parseInt(get(/🕛 Time: (\d+)/)) || 0,
            ap: get(/⚔ Dangerous Attacks: (\d+ - \d+)/),
            ap5: get(/Last 5': (.*?)\n/),
            corners: get(/⛳ Corners: (\d+ - \d+)/),
            pos: parseInt(get(/⚖ Possession: (\d+)/)) || 0,
            son: get(/🥅 Shots on: (\d+ - \d+)/),
            soff: get(/➡ Shots off: (\d+ - \d+)/),
            cards: get(/🟡 Yellow Cards: (\d+ - \d+)/),
            probHT: parseInt(get(/Medio Tiempo:(\d+)%/)) || 0,
            cuota: parseFloat(get(/Goal Live Line Odd:([\d.]+)/)) || 1.50
        };
    }

    async function fetchMessages() {
        const token = document.getElementById('botToken').value;
        if(!token) return alert("Falta Token");
        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
            const data = await res.json();
            if (data.ok && data.result.length > 0) {
                data.result.forEach(item => {
                    const msg = item.channel_post || item.message;
                    if(msg && msg.text && !db.find(x => x.id === msg.message_id)) {
                        const info = parseAlert(msg.text);
                        db.unshift({
                            id: msg.message_id,
                            fecha: new Date(msg.date * 1000).toLocaleString('es-MX'),
                            ...info,
                            status: 'PENDIENTE',
                            profit: 0
                        });
                    }
                });
                updateGlobalPatterns();
                saveDB();
                const lastId = data.result[data.result.length - 1].update_id;
                fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastId + 1}`);
            }
        } catch (e) { console.error(e); }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        db.forEach((d, i) => {
            // LÓGICA DE SELECCIÓN AUTOMÁTICA
            const isIdeal = (d.status === 'PENDIENTE') && 
                            (d.probHT >= currentBestPatterns.prob) && 
                            (d.pos >= currentBestPatterns.pos) &&
                            (d.minuto >= currentBestPatterns.min - 5);

            tbody.innerHTML += `
                <tr class="${isIdeal ? 'recommended-row' : ''}">
                    <td class="small-text">${d.fecha}</td>
                    <td>
                        <b>${d.partido}</b><span class="small-text">${d.liga}</span>
                        ${isIdeal ? '<span class="badge-real">🔥 APUESTA REAL</span>' : ''}
                    </td>
                    <td class="data-hl">${d.minuto}'</td>
                    <td>${d.ap}<br><span class="small-text">L5: ${d.ap5}</span></td>
                    <td>${d.corners}</td>
                    <td>${d.pos}%</td>
                    <td>${d.son} / ${d.soff}</td>
                    <td class="data-hl">${d.probHT}%</td>
                    <td>${d.cuota}</td>
                    <td>
                        <select onchange="setStatus(${i}, this.value)" style="background:#1e293b; color:${d.status === 'WIN' ? 'var(--success)' : (d.status === 'LOSS' ? 'var(--danger)' : 'white')}">
                            <option value="PENDIENTE" ${d.status === 'PENDIENTE' ? 'selected' : ''}>⏳</option>
                            <option value="WIN" ${d.status === 'WIN' ? 'selected' : ''}>WIN</option>
                            <option value="LOSS" ${d.status === 'LOSS' ? 'selected' : ''}>LOSS</option>
                        </select>
                    </td>
                    <td class="${d.profit > 0 ? 'win' : (d.profit < 0 ? 'loss' : '')}">${d.profit.toFixed(2)}</td>
                    <td><button onclick="deleteRow(${i})" style="background:none; color:var(--danger)">🗑</button></td>
                </tr>`;
        });
    }

    function analyzePatterns() {
        const resolved = db.filter(x => x.status !== 'PENDIENTE');
        const modal = document.getElementById('analysisModal');
        const resultsDiv = document.getElementById('analysisResults');
        modal.style.display = 'block';
        
        if(resolved.length < 3) {
            resultsDiv.innerHTML = '<p>Necesitas más datos para un análisis profundo.</p>';
            return;
        }

        const wins = resolved.filter(x => x.status === 'WIN');
        const winRateHT = ((wins.filter(x => x.probHT >= 80).length / resolved.filter(x => x.probHT >= 80).length || 0) * 100).toFixed(1);

        resultsDiv.innerHTML = `
            <div class="pattern-item"><strong>🎯 Configuración de Apuesta Real:</strong> Actualmente el sistema busca picks con >${currentBestPatterns.prob}% HT y >${currentBestPatterns.pos}% Posesión.</div>
            <div class="pattern-item"><strong>📊 Rendimiento HT 80%+:</strong> Tu acierto en alertas de alta probabilidad es del ${winRateHT}%.</div>
            <div class="pattern-item"><strong>🕒 Minuto Recomendado:</strong> La mayoría de tus aciertos ocurren después del minuto ${currentBestPatterns.min.toFixed(0)}.</div>
        `;
    }

    function setStatus(index, status) {
        const item = db[index];
        item.status = status;
        item.profit = status === 'WIN' ? parseFloat((item.cuota - 1).toFixed(2)) : (status === 'LOSS' ? -1 : 0);
        updateGlobalPatterns();
        saveDB();
    }

    function saveDB() {
        localStorage.setItem('cornerpro_db', JSON.stringify(db));
        calculateStats();
        render();
    }

    function calculateStats() {
        const settled = db.filter(x => x.status !== 'PENDIENTE');
        const wins = settled.filter(x => x.status === 'WIN').length;
        const totalProfit = settled.reduce((acc, curr) => acc + curr.profit, 0);
        document.getElementById('stat-total').innerText = settled.length;
        document.getElementById('stat-accuracy').innerText = settled.length ? ((wins/settled.length)*100).toFixed(1) + '%' : '0%';
        document.getElementById('stat-profit').innerText = totalProfit.toFixed(2);
        document.getElementById('stat-profit').style.color = totalProfit >= 0 ? 'var(--success)' : 'var(--danger)';
        document.getElementById('stat-yield').innerText = settled.length ? ((totalProfit/settled.length)*100).toFixed(1) + '%' : '0%';
    }

    function closeAnalysis() { document.getElementById('analysisModal').style.display = 'none'; }
    function deleteRow(i) { db.splice(i, 1); saveDB(); }
    function clearData() { if(confirm("¿Borrar historial?")) { db = []; saveDB(); } }
    function exportCSV() {
        let csv = "Fecha,Partido,Liga,Min,AP,HT_Prob,Cuota,Status,Profit\n";
        db.forEach(d => { csv += `"${d.fecha}","${d.partido}","${d.liga}",${d.minuto},"${d.ap}",${d.probHT},${d.cuota},${d.status},${d.profit}\n`; });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "Backtesting_Guru_AI.csv");
        link.click();
    }
</script>
</body>
</html>
