<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Poisson Engine | Análisis de Apuestas</title>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        /* Tables & Matrix */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .matrix-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        th { background: rgba(0,0,0,0.2); }

        .prob-high { background: rgba(34, 197, 94, 0.2); }
        .prob-mid { background: rgba(234, 179, 8, 0.2); }

        .ev-positive { color: var(--accent); font-weight: bold; }
        .ev-negative { color: var(--danger); }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>EL GURÚ DE LAS APUESTAS</h1>
        <p>Motor de Inferencia Poisson v2.0</p>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>Parámetros del Encuentro</h3>
            
            <div class="input-group">
                <label>Promedio Goles Liga (Goles/Partido)</label>
                <input type="number" id="leagueAvg" value="2.5" step="0.1">
            </div>

            <hr style="border: 0.5px solid #334155; margin: 20px 0;">

            <div id="statsInputs">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="input-group">
                        <label>Goles Favor Local</label>
                        <input type="number" id="homeGF" value="20">
                    </div>
                    <div class="input-group">
                        <label>Goles Contra Local</label>
                        <input type="number" id="homeGC" value="15">
                    </div>
                    <div class="input-group">
                        <label>Goles Favor Visita</label>
                        <input type="number" id="awayGF" value="18">
                    </div>
                    <div class="input-group">
                        <label>Goles Contra Visita</label>
                        <input type="number" id="awayGC" value="22">
                    </div>
                </div>
            </div>

            <label class="toggle-container">
                <input type="checkbox" id="useXG" style="width: auto;"> Usar xG Avanzado
            </label>

            <div id="xgInputs" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group">
                    <label>xG Local</label>
                    <input type="number" id="homeXG" value="1.5" step="0.1">
                </div>
                <div class="input-group">
                    <label>xG Visita</label>
                    <input type="number" id="awayXG" value="1.2" step="0.1">
                </div>
            </div>

            <div class="input-group" style="margin-top: 10px;">
                <label>Cuotas 1 - X - 2 (Opcional para EV)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="odds1" placeholder="Local" step="0.01">
                    <input type="number" id="oddsX" placeholder="Empate" step="0.01">
                    <input type="number" id="odds2" placeholder="Visita" step="0.01">
                </div>
            </div>

            <button onclick="calculatePoisson()">Calcular Probabilidades</button>
        </div>

        <div class="card" id="resultsPanel" style="display: none;">
            <h3>Proyecciones de Resultado</h3>
            <div class="results-grid">
                <div class="stat-box">
                    <label>λ Local (Goles Esp.)</label>
                    <div id="expLocal" class="stat-val">0.00</div>
                </div>
                <div class="stat-box">
                    <label>λ Visita (Goles Esp.)</label>
                    <div id="expAway" class="stat-val">0.00</div>
                </div>
            </div>

            <div class="results-grid">
                <div class="stat-box">
                    <label>Local (1)</label>
                    <div id="prob1" class="stat-val">0%</div>
                    <div id="ev1" class="ev-tag"></div>
                </div>
                <div class="stat-box">
                    <label>Empate (X)</label>
                    <div id="probX" class="stat-val">0%</div>
                    <div id="evX" class="ev-tag"></div>
                </div>
                <div class="stat-box">
                    <label>Visita (2)</label>
                    <div id="prob2" class="stat-val">0%</div>
                    <div id="ev2" class="ev-tag"></div>
                </div>
            </div>

            <div class="results-grid">
                <div class="stat-box">
                    <label>Over 2.5</label>
                    <div id="probOver" class="stat-val">0%</div>
                </div>
                <div class="stat-box">
                    <label>BTTS (Ambos Marcan)</label>
                    <div id="probBTTS" class="stat-val">0%</div>
                </div>
            </div>

            <div class="matrix-container">
                <label>Matriz de Probabilidades (Resultados Exactos)</label>
                <table id="matrixTable">
                    </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Mostrar/Ocultar xG
    document.getElementById('useXG').addEventListener('change', function(e) {
        document.getElementById('xgInputs').style.display = e.target.checked ? 'grid' : 'none';
    });

    /**
     * Función factorial
     */
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    /**
     * Fórmula de Distribución de Poisson
     */
    function poisson(lambda, x) {
        return (Math.exp(-lambda) * Math.pow(lambda, x)) / factorial(x);
    }

    function calculatePoisson() {
        const leagueAvg = parseFloat(document.getElementById('leagueAvg').value);
        const useXG = document.getElementById('useXG').checked;
        
        let lambdaHome, lambdaAway;

        if (useXG) {
            // Uso directo de xG como lambda
            lambdaHome = parseFloat(document.getElementById('homeXG').value);
            lambdaAway = parseFloat(document.getElementById('awayXG').value);
        } else {
            // Cálculo tradicional por ataque/defensa
            const homeGF = parseFloat(document.getElementById('homeGF').value);
            const homeGC = parseFloat(document.getElementById('homeGC').value);
            const awayGF = parseFloat(document.getElementById('awayGF').value);
            const awayGC = parseFloat(document.getElementById('awayGC').value);

            const attackHome = (homeGF / 10) / leagueAvg; // Asumiendo muestra de 10 partidos
            const defenseHome = (homeGC / 10) / leagueAvg;
            const attackAway = (awayGF / 10) / leagueAvg;
            const defenseAway = (awayGC / 10) / leagueAvg;

            lambdaHome = attackHome * defenseAway * leagueAvg;
            lambdaAway = attackAway * defenseHome * leagueAvg;
        }

        renderResults(lambdaHome, lambdaAway);
    }

    function renderResults(lH, lA) {
        document.getElementById('resultsPanel').style.display = 'block';
        document.getElementById('expLocal').innerText = lH.toFixed(2);
        document.getElementById('expAway').innerText = lA.toFixed(2);

        let distHome = [];
        let distAway = [];
        
        // Calcular distribuciones 0-5
        for (let i = 0; i <= 5; i++) {
            distHome.push(poisson(lH, i));
            distAway.push(poisson(lA, i));
        }

        // 1X2, Over/Under y BTTS
        let pHome = 0, pDraw = 0, pAway = 0;
        let pOver25 = 0;
        let pBTTS = (1 - distHome[0]) * (1 - distAway[0]);

        // Generar Matriz y calcular mercados
        let matrixHtml = '<tr><th>L \\ V</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>';
        
        for (let i = 0; i <= 5; i++) {
            matrixHtml += `<tr><td><strong>${i}</strong></td>`;
            for (let j = 0; j <= 5; j++) {
                let pRes = distHome[i] * distAway[j];
                let probPct = (pRes * 100).toFixed(1);
                
                // Clasificar colores
                let cellClass = pRes > 0.1 ? 'prob-high' : (pRes > 0.05 ? 'prob-mid' : '');
                matrixHtml += `<td class="${cellClass}">${probPct}%</td>`;

                // Sumar mercados
                if (i > j) pHome += pRes;
                else if (i === j) pDraw += pRes;
                else pAway += pRes;

                if (i + j > 2.5) pOver25 += pRes;
            }
            matrixHtml += '</tr>';
        }

        document.getElementById('matrixTable').innerHTML = matrixHtml;
        document.getElementById('prob1').innerText = (pHome * 100).toFixed(1) + '%';
        document.getElementById('probX').innerText = (pDraw * 100).toFixed(1) + '%';
        document.getElementById('prob2').innerText = (pAway * 100).toFixed(1) + '%';
        document.getElementById('probOver').innerText = (pOver25 * 100).toFixed(1) + '%';
        document.getElementById('probBTTS').innerText = (pBTTS * 100).toFixed(1) + '%';

        // Calcular EV si hay cuotas
        calculateEV('odds1', pHome, 'ev1');
        calculateEV('oddsX', pDraw, 'evX');
        calculateEV('odds2', pAway, 'ev2');
    }

    function calculateEV(inputId, prob, displayId) {
        const odd = parseFloat(document.getElementById(inputId).value);
        const display = document.getElementById(displayId);
        if (odd > 0) {
            const ev = (prob * odd) - 1;
            const evPct = (ev * 100).toFixed(1);
            display.innerText = `EV: ${evPct}%`;
            display.className = ev > 0 ? 'ev-tag ev-positive' : 'ev-tag ev-negative';
        } else {
            display.innerText = '';
        }
    }
</script>

</body>
</html>
