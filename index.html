<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtesting Tool - Analizador de Alertas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --verde: #2ecc71;
            --rojo: #e74c3c;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: var(--dark); text-align: center; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        th { background: #f9f9f9; }
        .win { color: var(--verde); font-weight: bold; }
        .loss { color: var(--rojo); font-weight: bold; }
        .summary-box {
            display: flex;
            justify-content: space-around;
            background: var(--dark);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .summary-item { text-align: center; }
        .summary-item big { font-size: 24px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Backtesting Dashboard</h1>
    <p>Pega tus datos abajo (incluyendo encabezados o solo las filas):</p>
    <textarea id="rawData" placeholder="Fecha	Minuto	Evento	Liga	Mercado	Odd	Stake	Resultado..."></textarea>
    <button onclick="processData()">Analizar Datos</button>

    <div id="results" style="display:none;">
        <div class="summary-box" id="generalSummary">
            </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Por Mes</h3>
                <table id="tableMonth"><thead><tr><th>Mes</th><th>W</th><th>L</th><th>Winrate</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Por Día de la Semana</h3>
                <table id="tableDay"><thead><tr><th>Día</th><th>W</th><th>L</th><th>Winrate</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Por Cuota (Odd Range)</h3>
                <table id="tableOdd"><thead><tr><th>Rango</th><th>W</th><th>L</th><th>Winrate</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Por Minuto de Alerta</h3>
                <table id="tableMinute"><thead><tr><th>Minuto</th><th>W</th><th>L</th><th>Winrate</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Por Hora</h3>
                <table id="tableHour"><thead><tr><th>Hora</th><th>W</th><th>L</th><th>Winrate</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card" style="grid-column: span 1;">
                <h3>Top 10 Ligas</h3>
                <table id="tableLeague"><thead><tr><th>Liga</th><th>W</th><th>L</th><th>%</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
function processData() {
    const text = document.getElementById('rawData').value.trim();
    if (!text) return;

    const rows = text.split('\n');
    let data = [];
    
    // Procesar filas
    rows.forEach(row => {
        const cols = row.split('\t');
        if (cols.length < 8 || cols[0].toLowerCase().includes('fecha')) return;

        const fechaStr = cols[0]; // 3/17/26 16:30
        const minuto = cols[1].replace("'", "");
        const liga = cols[3];
        const odd = parseFloat(cols[5]);
        const resultado = cols[7].toLowerCase().trim();

        // Parsear fecha
        const dt = new Date(fechaStr);
        if (isNaN(dt)) return;

        data.push({
            month: dt.toLocaleString('es-ES', { month: 'long' }),
            day: dt.toLocaleString('es-ES', { weekday: 'long' }),
            hour: dt.getHours() + ":00",
            minute: minuto,
            league: liga,
            oddRange: getOddRange(odd),
            isWin: resultado === 'verde'
        });
    });

    renderAll(data);
}

function getOddRange(odd) {
    if (odd < 1.50) return '1.00 - 1.49';
    if (odd < 1.70) return '1.50 - 1.69';
    if (odd < 1.90) return '1.70 - 1.89';
    return '1.90+';
}

function renderAll(data) {
    document.getElementById('results').style.display = 'block';
    
    // Cálculos de resumen
    const total = data.length;
    const wins = data.filter(d => d.isWin).length;
    const losses = total - wins;
    const wr = ((wins / total) * 100).toFixed(2);

    document.getElementById('generalSummary').innerHTML = `
        <div class="summary-item"><big>${total}</big>Alertas</div>
        <div class="summary-item"><big class="win">${wins}</big>Ganadas</div>
        <div class="summary-item"><big class="loss">${losses}</big>Perdidas</div>
        <div class="summary-item"><big>${wr}%</big>Winrate</div>
    `;

    // Llenar tablas
    fillTable('tableMonth', groupBy(data, 'month'));
    fillTable('tableDay', groupBy(data, 'day'));
    fillTable('tableOdd', groupBy(data, 'oddRange'));
    fillTable('tableMinute', groupBy(data, 'minute'));
    fillTable('tableHour', groupBy(data, 'hour'));
    fillTable('tableLeague', groupBy(data, 'league'), 10);
}

function groupBy(data, key) {
    const group = data.reduce((acc, obj) => {
        const val = obj[key];
        if (!acc[val]) acc[val] = { w: 0, l: 0 };
        obj.isWin ? acc[val].w++ : acc[val].l++;
        return acc;
    }, {});
    return group;
}

function fillTable(tableId, groupedData, limit = 999) {
    const tbody = document.querySelector(`#${tableId} tbody`);
    tbody.innerHTML = '';
    
    const sortedKeys = Object.keys(groupedData).sort((a, b) => {
        return (groupedData[b].w + groupedData[b].l) - (groupedData[a].w + groupedData[a].l);
    });

    sortedKeys.slice(0, limit).forEach(key => {
        const { w, l } = groupedData[key];
        const total = w + l;
        const wr = ((w / total) * 100).toFixed(1);
        const row = `<tr>
            <td>${key}</td>
            <td class="win">${w}</td>
            <td class="loss">${l}</td>
            <td>${wr}%</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>

</body>
</html>
