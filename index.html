<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poisson xG - El Gurú de las Apuestas</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 { text-align: center; color: var(--primary); font-weight: 300; }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #00ffcc;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        select { background: #334155; color: white; }

        button {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
        }

        .prob-bar {
            height: 10px;
            background: #444;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        .fill { height: 100%; background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 El Gurú de las Apuestas</h1>
    <p>Pega aquí los datos de xG (incluyendo cabeceras):</p>
    <textarea id="csvData" placeholder="id	matchDate	Country	League..."></textarea>
    
    <div class="controls">
        <button onclick="processData()">1. Cargar Datos</button>
        <select id="leagueSelector" onchange="updateTeams()">
            <option value="">Selecciona Liga</option>
        </select>
        <button onclick="calculatePoisson()" style="background: #22c55e;">2. Calcular Pronóstico</button>
    </div>

    <div class="controls">
        <select id="homeTeam"><option value="">Local</option></select>
        <select id="awayTeam"><option value="">Visitante</option></select>
    </div>

    <div id="output" class="results"></div>
</div>

<script>
    let db = {};

    function processData() {
        const text = document.getElementById('csvData').value.trim();
        const lines = text.split('\n');
        const headers = lines[0].split('\t');

        lines.slice(1).forEach(line => {
            const cols = line.split('\t');
            if (cols.length < 10) return;

            const league = `${cols[2]} - ${cols[3]}`; // Country - League
            const home = cols[5];
            const away = cols[6];
            const xgh = parseFloat(cols[7]);
            const xga = parseFloat(cols[8]);

            if (!db[league]) db[league] = {};
            if (!db[league][home]) db[league][home] = { gf: [], gc: [] };
            if (!db[league][away]) db[league][away] = { gf: [], gc: [] };

            db[league][home].gf.push(xgh);
            db[league][home].gc.push(xga);
            db[league][away].gf.push(xga);
            db[league][away].gc.push(xgh);
        });

        const selector = document.getElementById('leagueSelector');
        selector.innerHTML = '<option value="">Selecciona Liga</option>';
        Object.keys(db).forEach(l => {
            selector.innerHTML += `<option value="${l}">${l}</option>`;
        });
        alert("Datos cargados correctamente por Liga.");
    }

    function updateTeams() {
        const league = document.getElementById('leagueSelector').value;
        const hSelect = document.getElementById('homeTeam');
        const aSelect = document.getElementById('awayTeam');
        hSelect.innerHTML = '';
        aSelect.innerHTML = '';

        if (db[league]) {
            Object.keys(db[league]).sort().forEach(team => {
                const opt = `<option value="${team}">${team}</option>`;
                hSelect.innerHTML += opt;
                aSelect.innerHTML += opt;
            });
        }
    }

    function poisson(k, lambda) {
        return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
    }

    function factorial(n) {
        if (n === 0) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function calculatePoisson() {
        const league = document.getElementById('leagueSelector').value;
        const t1 = document.getElementById('homeTeam').value;
        const t2 = document.getElementById('awayTeam').value;

        if (!t1 || !t2 || t1 === t2) return alert("Selecciona equipos distintos");

        // Promedios simples de xG de la muestra cargada
        const getAvg = (arr) => arr.reduce((a,b) => a+b, 0) / arr.length;
        
        const lambdaH = (getAvg(db[league][t1].gf) + getAvg(db[league][t2].gc)) / 2;
        const lambdaA = (getAvg(db[league][t2].gf) + getAvg(db[league][t1].gc)) / 2;

        let pHome = 0, pAway = 0, pDraw = 0;
        let matrix = "";

        for (let i = 0; i < 6; i++) {
            for (let j = 0; j < 6; j++) {
                const prob = poisson(i, lambdaH) * poisson(j, lambdaA);
                if (i > j) pHome += prob;
                else if (i < j) pAway += prob;
                else pDraw += prob;
            }
        }

        const total = pHome + pAway + pDraw;
        const toPct = (val) => ((val / total) * 100).toFixed(1);

        document.getElementById('output').innerHTML = `
            <div class="card">
                <h3>Probabilidades</h3>
                <p>Local (${t1}): ${toPct(pHome)}%</p>
                <div class="prob-bar"><div class="fill" style="width:${toPct(pHome)}%"></div></div>
                <p>Empate: ${toPct(pDraw)}%</p>
                <div class="prob-bar"><div class="fill" style="width:${toPct(pDraw)}%; background:#94a3b8"></div></div>
                <p>Visitante (${t2}): ${toPct(pAway)}%</p>
                <div class="prob-bar"><div class="fill" style="width:${toPct(pAway)}%; background:#f43f5e"></div></div>
            </div>
            <div class="card" style="border-left-color: #eab308;">
                <h3>Expectativa de Goles</h3>
                <p>${t1}: <b>${lambdaH.toFixed(2)} xG</b></p>
                <p>${t2}: <b>${lambdaA.toFixed(2)} xG</b></p>
                <p>Sugerencia: ${lambdaH + lambdaA > 2.5 ? 'Over 2.5' : 'Under 2.5'}</p>
            </div>
        `;
    }
</script>

</body>
</html>
