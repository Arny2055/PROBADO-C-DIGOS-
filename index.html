<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Quant Backtester - Institutional Grade</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --verde: #00f2fe;
            --rojo: #ff5470;
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #7928ca;
            --gold: #f1c40f;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 1500px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #30363d; }
        .header h1 { margin: 0; font-size: 1.5em; color: var(--verde); letter-spacing: 2px; }
        
        textarea {
            width: 100%; height: 100px; background: #0d1117; color: #58a6ff;
            border: 1px solid #30363d; border-radius: 8px; padding: 12px;
            font-family: monospace; font-size: 12px; margin-top: 15px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            margin: 10px 0; transition: 0.3s; font-size: 14px;
        }
        button:hover { background: #9146ff; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .metric-card {
            background: var(--card); padding: 15px; border-radius: 10px;
            border: 1px solid #30363d;
        }
        .metric-card small { color: #8b949e; display: block; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        .metric-card div { font-size: 1.4em; font-weight: 800; }
        .high-risk { border-left: 4px solid var(--rojo); }
        .high-profit { border-left: 4px solid var(--verde); }

        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px; margin-bottom: 15px;
        }
        .chart-container {
            background: var(--card); border: 1px solid #30363d;
            padding: 15px; border-radius: 12px;
        }
        .secondary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }

        .val-up { color: var(--verde); }
        .val-down { color: var(--rojo); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 10px; border-bottom: 1px solid #30363d; color: #8b949e; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        h3 { margin-top: 0; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>QUANTUM BACKTEST <span>PRO</span></h1>
        <div id="status" style="color: var(--gold); font-size: 12px;">READY</div>
    </div>

    <textarea id="rawData" placeholder="Pega tus datos aquí..."></textarea>
    <button onclick="runProAnalysis()">EJECUTAR ANÁLISIS PROFESIONAL</button>

    <div id="dashboard" style="display:none;">
        <div class="metrics-grid" id="proMetrics"></div>

        <div class="grid-layout">
            <div class="chart-container">
                <h3>EQUITY CURVE (PROFIT ACUMULADO)</h3>
                <div style="height: 350px;"><canvas id="mainEquity"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>PROFIT FACTOR POR CUOTA</h3>
                <div style="height: 350px;"><canvas id="profitFactorChart"></canvas></div>
            </div>
        </div>

        <div class="secondary-grid">
            <div class="chart-container">
                <h3>NET PROFIT POR MINUTO</h3>
                <canvas id="minuteProfit"></canvas>
            </div>
            <div class="chart-container">
                <h3>PROFIT POR DÍA</h3>
                <canvas id="dayAnalysis"></canvas>
            </div>
            <div class="chart-container">
                <h3>EFICIENCIA POR HORA</h3>
                <canvas id="hourAnalysis"></canvas>
            </div>
            <div class="chart-container">
                <h3>TOP LIGAS (EXP/PICK)</h3>
                <div id="leagueAnalysis"></div>
            </div>
        </div>
    </div>
</div>

<script>
let charts = {};

function runProAnalysis() {
    const raw = document.getElementById('rawData').value.trim();
    if(!raw) return;

    const lines = raw.split('\n');
    let rawDataObjects = [];

    // 1. Parsing y Limpieza
    lines.forEach(line => {
        const c = line.split('\t');
        if(c.length < 8 || c[0].toLowerCase().includes('fecha')) return;

        const odd = parseFloat(c[5].replace(',', '.'));
        const win = c[7].toLowerCase().trim() === 'verde';
        const profit = win ? (odd - 1) : -1;
        const dt = new Date(c[0]);

        rawDataObjects.push({
            date: dt,
            h: dt.getHours(),
            d: dt.toLocaleString('es-ES', { weekday: 'short' }),
            m: parseInt(c[1].replace("'", "").trim()),
            league: c[3].trim(),
            odd: odd,
            profit: profit,
            win: win
        });
    });

    // 2. Ordenar por fecha para Equity real
    rawDataObjects.sort((a, b) => a.date - b.date);

    // 3. Cálculos Pro
    let equity = [0];
    let maxEquity = 0;
    let maxDD = 0;
    let winP = 0;
    let lossP = 0;

    rawDataObjects.forEach(x => {
        if(x.win) winP += x.profit; else lossP += Math.abs(x.profit);
        
        const currentEquity = equity[equity.length - 1] + x.profit;
        equity.push(parseFloat(currentEquity.toFixed(2)));
        
        if(currentEquity > maxEquity) maxEquity = currentEquity;
        const dd = maxEquity - currentEquity;
        if(dd > maxDD) maxDD = dd;
    });

    renderPro(rawDataObjects, equity, maxDD, winP, lossP);
}

function renderPro(db, equity, maxDD, winP, lossP) {
    document.getElementById('dashboard').style.display = 'block';
    const profitTotal = equity[equity.length - 1];
    const profitFactor = (winP / (lossP || 1)).toFixed(2);
    const ev = (profitTotal / db.length).toFixed(2);

    document.getElementById('proMetrics').innerHTML = `
        <div class="metric-card high-profit"><small>Net Profit</small><div class="${profitTotal>=0?'val-up':'val-down'}">${profitTotal.toFixed(2)} u.</div></div>
        <div class="metric-card"><small>Profit Factor</small><div class="${profitFactor>1.2?'val-up':'val-down'}">${profitFactor}</div></div>
        <div class="metric-card high-risk"><small>Max Drawdown</small><div class="val-down">-${maxDD.toFixed(2)} u.</div></div>
        <div class="metric-card"><small>Esperanza</small><div>${ev} u.</div></div>
        <div class="metric-card"><small>Yield %</small><div>${((profitTotal/db.length)*100).toFixed(1)}%</div></div>
        <div class="metric-card"><small>Winrate</small><div>${((db.filter(x=>x.win).length/db.length)*100).toFixed(0)}%</div></div>
    `;

    updateChart('mainEquity', 'line', equity.map((_,i)=>i), equity, 'Equity');

    // Profit Factor por Rango (Corregido)
    const ranges = {'<1.6':[], '1.6-1.7':[], '1.7-1.8':[], '1.8+':[]};
    db.forEach(x => {
        let r = x.odd < 1.6 ? '<1.6' : x.odd < 1.7 ? '1.6-1.7' : x.odd < 1.8 ? '1.7-1.8' : '1.8+';
        ranges[r].push(x);
    });
    const pfData = Object.keys(ranges).map(r => {
        const w = ranges[r].filter(x=>x.win).reduce((a,b)=>a+b.profit,0);
        const l = ranges[r].filter(x=>!x.win).length;
        return (w/(l||1)).toFixed(2);
    });
    updateChart('profitFactorChart', 'bar', Object.keys(ranges), pfData, 'Profit Factor');

    updateChart('minuteProfit', 'bar', Object.keys(group(db, 'm')), Object.values(group(db, 'm')), 'Profit');
    updateChart('dayAnalysis', 'bar', Object.keys(group(db, 'd')), Object.values(group(db, 'd')), 'Profit');
    
    const hGroup = group(db, 'h');
    updateChart('hourAnalysis', 'line', Object.keys(hGroup).sort((a,b)=>a-b), Object.values(hGroup), 'Profit');

    // Tabla de Ligas
    const leagues = {};
    db.forEach(x => {
        if(!leagues[x.league]) leagues[x.league] = {p:0, n:0};
        leagues[x.league].p += x.profit;
        leagues[x.league].n += 1;
    });
    let lHtml = `<table><tr><th>Liga</th><th>Profit</th><th>Exp/Pick</th></tr>`;
    Object.keys(leagues).sort((a,b)=>leagues[b].p - leagues[a].p).slice(0,10).forEach(l => {
        const exp = (leagues[l].p / leagues[l].n).toFixed(2);
        lHtml += `<tr><td>${l}</td><td class="val-up">${leagues[l].p.toFixed(2)}</td><td>${exp}</td></tr>`;
    });
    document.getElementById('leagueAnalysis').innerHTML = lHtml + `</table>`;
}

function group(data, key) {
    let res = {};
    data.forEach(x => { res[x[key]] = (res[x[key]] || 0) + x.profit; });
    return res;
}

function updateChart(id, type, labels, data, label) {
    if(charts[id]) charts[id].destroy();
    const ctx = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data,
                borderColor: '#00f2fe',
                backgroundColor: data.map(v => v >= 0 ? 'rgba(0, 242, 254, 0.4)' : 'rgba(255, 84, 112, 0.4)'),
                tension: 0.3,
                fill: type === 'line',
                pointRadius: type === 'line' ? 2 : 3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e'} },
                x: { grid: { display: false }, ticks: { color: '#8b949e'} }
            }
        }
    });
}
</script>
</body>
</html>
