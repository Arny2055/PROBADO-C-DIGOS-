<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Rendimiento - El Gurú</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #00d4ff; 
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --success: #22c55e; 
            --warning: #eab308; 
            --danger: #f43f5e; 
            --purple: #a855f7;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 20px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 { color: var(--primary); font-weight: 300; text-align: center; margin-bottom: 30px; }

        /* Grid de Estadísticas */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .stat-card { 
            background: var(--glass); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--border); 
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .stat-card h4 { margin: 0; font-size: 0.75em; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 1.8em; font-weight: bold; margin: 10px 0 0 0; }

        /* Área de Gráfica */
        .chart-container {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            height: 350px;
        }

        /* Tablas */
        .table-container {
            background: var(--glass);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.4); color: var(--primary); text-transform: uppercase; font-size: 0.75em; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Botones */
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-g { background: var(--success); color: #064e3b; }
        .btn-p { background: var(--danger); color: #450a0a; }
        .btn-n { background: #64748b; color: white; }
        .btn-del { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-left: 5px; }
        .btn-del:hover { background: var(--danger); color: white; }

        .filters { display: flex; justify-content: flex-end; margin-bottom: 15px; }

        .summary-box { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .category-table h4 { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .badge-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔔 Dashboard de Alertas y Estrategia</h2>
    
    <div class="stats-grid" id="mainStats"></div>

    <div class="chart-container">
        <canvas id="profitChart"></canvas>
    </div>

    <div class="filters">
        <button class="btn btn-p" style="font-size: 0.8em;" onclick="clearAll()">⚠️ Limpiar Todo</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Liga</th>
                    <th>Evento</th>
                    <th>Mercado</th>
                    <th>Prob / Cuota</th>
                    <th>Stake</th>
                    <th>Resultado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="alertsTable"></tbody>
        </table>
    </div>

    <div class="summary-box">
        <div class="category-table">
            <h4>📈 Por Liga</h4>
            <div id="profitByLeague"></div>
        </div>
        <div class="category-table">
            <h4>📊 Por Mercado</h4>
            <div id="profitByMarket"></div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    function loadData() {
        const alerts = JSON.parse(localStorage.getItem('guru_alerts')) || [];
        const table = document.getElementById('alertsTable');
        table.innerHTML = '';
        
        // Copia para la tabla (orden descendente por tiempo)
        const displayAlerts = [...alerts].reverse();
        
        displayAlerts.forEach(a => {
            const row = document.createElement('tr');
            const statusClass = a.status === 'ganado' ? 'color: var(--success)' : (a.status === 'perdido' ? 'color: var(--danger)' : '');
            
            row.innerHTML = `
                <td>${a.league}</td>
                <td>${a.event}</td>
                <td>${a.market}</td>
                <td><small>${a.prob}</small> <b style="color:var(--primary)">@${a.odd}</b></td>
                <td><b>${a.stake}u</b></td>
                <td style="${statusClass}; font-weight:bold;">${a.status.toUpperCase()}</td>
                <td>
                    ${a.status === 'pendiente' ? `
                        <button class="btn btn-g" onclick="setStatus(${a.id}, 'ganado')">G</button>
                        <button class="btn btn-p" onclick="setStatus(${a.id}, 'perdido')">P</button>
                        <button class="btn btn-n" onclick="setStatus(${a.id}, 'nulo')">N</button>
                    ` : ``}
                    <button class="btn btn-del" onclick="deleteAlert(${a.id})">🗑</button>
                </td>
            `;
            table.appendChild(row);
        });
        calculateStats(alerts);
    }

    function setStatus(id, status) {
        let alerts = JSON.parse(localStorage.getItem('guru_alerts')) || [];
        const idx = alerts.findIndex(a => a.id === id);
        if(idx !== -1) {
            alerts[idx].status = status;
            localStorage.setItem('guru_alerts', JSON.stringify(alerts));
            loadData();
        }
    }

    function deleteAlert(id) {
        if(confirm("¿Eliminar esta alerta?")) {
            let alerts = JSON.parse(localStorage.getItem('guru_alerts')) || [];
            alerts = alerts.filter(a => a.id !== id);
            localStorage.setItem('guru_alerts', JSON.stringify(alerts));
            loadData();
        }
    }

    function clearAll() {
        if(confirm("¿Estás seguro? Se borrarán todas las estadísticas permanentemente.")) {
            localStorage.setItem('guru_alerts', JSON.stringify([]));
            loadData();
        }
    }

    function calculateStats(alerts) {
        let totalProfit = 0;
        let totalStaked = 0;
        let wins = 0;
        let totalResolved = 0;
        let byLeague = {};
        let byMarket = {};
        let chartData = [0]; // Empezamos en cero
        let chartLabels = ["Inicio"];

        // Ordenamos por ID (tiempo) para la gráfica cronológica
        const cronAlerts = [...alerts].sort((a, b) => a.id - b.id);

        cronAlerts.forEach((a, index) => {
            if(a.status === 'pendiente') return;
            
            totalResolved++;
            let s = parseFloat(a.stake);
            let o = parseFloat(a.odd);
            let res = 0;

            if(a.status === 'ganado') {
                res = s * (o - 1);
                wins++;
            } else if(a.status === 'perdido') {
                res = -s;
            }
            
            totalProfit += res;
            totalStaked += s;
            
            chartData.push(totalProfit.toFixed(2));
            chartLabels.push(index + 1);

            byLeague[a.league] = (byLeague[a.league] || 0) + res;
            byMarket[a.market] = (byMarket[a.market] || 0) + res;
        });

        const yieldVal = totalStaked > 0 ? (totalProfit / totalStaked) * 100 : 0;
        const winRate = totalResolved > 0 ? (wins / totalResolved) * 100 : 0;
        
        // P-Value (Aproximación para apuestas)
        // Mide la probabilidad de que estos resultados sean por "suerte"
        const pValue = totalResolved > 10 ? calculatePValue(totalResolved, wins, yieldVal) : "---";

        document.getElementById('mainStats').innerHTML = `
            <div class="stat-card"><h4>Profit Total</h4><p style="color:${totalProfit>=0?'var(--success)':'var(--danger)'}">${totalProfit.toFixed(2)}u</p></div>
            <div class="stat-card"><h4>Yield</h4><p>${yieldVal.toFixed(2)}%</p></div>
            <div class="stat-card"><h4>% Acierto</h4><p>${winRate.toFixed(1)}%</p></div>
            <div class="stat-card"><h4>P-Value</h4><p style="font-size:1.2em; margin-top:15px;">${pValue}</p></div>
        `;

        updateChart(chartLabels, chartData);
        renderSmallTable('profitByLeague', byLeague);
        renderSmallTable('profitByMarket', byMarket);
    }

    function calculatePValue(n, w, y) {
        // Simplificación: Un P-Value < 0.05 sugiere que la estrategia tiene ventaja real
        const z = (y / 100) * Math.sqrt(n);
        if (z <= 0) return "1.000 (Azar)";
        const p = 1 - 0.5 * (1 + Math.erf(z / Math.sqrt(2)));
        return p.toFixed(4);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Profit Acumulado (unidades)',
                    data: data,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#0f172a'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    function renderSmallTable(id, obj) {
        let html = '<table><thead><tr><th>Categoría</th><th>Profit</th></tr></thead>';
        const sorted = Object.entries(obj).sort((a,b) => b[1] - a[1]);
        for(const [key, val] of sorted) {
            html += `<tr><td>${key}</td><td style="color:${val>=0?'var(--success)':'var(--danger)'}; font-weight:bold;">${val.toFixed(2)}u</td></tr>`;
        }
        document.getElementById(id).innerHTML = html + '</table>';
    }

    window.onload = loadData;
</script>

</body>
</html>
