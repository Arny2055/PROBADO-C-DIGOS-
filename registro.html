<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS - Registro de Apuestas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; font-size: 11px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background-color: #0f172a; border: 1px solid #334155; border-radius: 0.4rem; padding: 0.4rem; color: #22d3ee; outline: none; }
        .editable-input { background: transparent; border: 1px solid transparent; color: #60a5fa; width: 50px; transition: all 0.2s; }
        .editable-input:hover { border-color: #334155; background: rgba(15, 23, 42, 0.5); }
        .editable-input:focus { border-color: #22d3ee; background: #0f172a; outline: none; }
        th { text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; font-size: 9px; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .status-win { color: #10b981; font-weight: bold; }
        .status-loss { color: #f43f5e; font-weight: bold; }
        .status-pending { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400">Control de Rendimiento <span class="text-slate-500 font-light text-sm">BetAGS</span></h1>
            <div class="flex gap-2">
                <button onclick="clearAll()" class="bg-red-900/30 text-red-400 border border-red-800 px-3 py-1 rounded text-[10px] hover:bg-red-800 hover:text-white transition-all">LIMPIAR TODO</button>
                <a href="index.html" class="bg-slate-800 px-3 py-1 rounded text-[10px] border border-slate-700">VOLVER</a>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="glass-card p-4 rounded-xl border-b-2 border-blue-500">
                <p class="text-[9px] text-slate-400 uppercase">Win Rate</p>
                <p id="statWinRate" class="text-2xl font-black text-white">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl border-b-2 border-emerald-500">
                <p class="text-[9px] text-slate-400 uppercase">Yield</p>
                <p id="statYield" class="text-2xl font-black text-white">0%</p>
            </div>
            <div class="glass-card p-4 rounded-xl border-b-2 border-red-500">
                <p class="text-[9px] text-slate-400 uppercase">Max Drawdown</p>
                <p id="statDrawdown" class="text-2xl font-black text-white">0u</p>
            </div>
            <div class="glass-card p-4 rounded-xl border-b-2 border-purple-500">
                <p class="text-[9px] text-slate-400 uppercase">P-Value (Suerte)</p>
                <p id="statPValue" class="text-2xl font-black text-white">0.00</p>
            </div>
            <div class="glass-card p-4 rounded-xl border-b-2 border-yellow-500">
                <p class="text-[9px] text-slate-400 uppercase">Profit</p>
                <p id="statProfit" class="text-2xl font-black text-white">0 u</p>
            </div>
        </div>

        <div class="glass-card p-4 rounded-xl mb-4 flex flex-wrap gap-4 items-center">
            <input type="text" id="filterLiga" placeholder="Filtrar Liga..." class="input-field text-[10px]" oninput="renderTable()">
            <select id="ligaSelect" class="input-field text-[10px]" onchange="filterSelectedLiga()">
                <option value="">Todas las Ligas</option>
            </select>
            <select id="filterMercado" class="input-field text-[10px]" onchange="renderTable()">
                <option value="">Todos los Mercados</option>
                <option value="Over 0.5 HT">Over 0.5 HT</option>
                <option value="Over 1.5 HT">Over 1.5 HT</option>
                <option value="Over 0.5 2T">Over 0.5 2T</option>
                <option value="Over 1.5 2T">Over 1.5 2T</option>
                <option value="Over 0.5 (16-45)">Over 0.5 (16-45)</option>
            </select>
            <input type="number" id="filterCuota" placeholder="Cuota min..." class="input-field text-[10px]" oninput="renderTable()">
        </div>

        <div class="glass-card rounded-xl overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-800/50">
                        <th>Fecha/Liga</th>
                        <th>Evento</th>
                        <th>Mercado/Prob</th>
                        <th>Min/Cuota</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        function renderTable() {
            const registro = JSON.parse(localStorage.getItem('betags_registro')) || [];
            const cuerpo = document.getElementById('tablaCuerpo');
            const fLiga = document.getElementById('filterLiga').value.toLowerCase();
            const fMercado = document.getElementById('filterMercado').value;
            const fCuota = parseFloat(document.getElementById('filterCuota').value) || 0;
            const ligaDropdown = document.getElementById('ligaSelect');

            cuerpo.innerHTML = "";
            ligaDropdown.innerHTML = `<option value="">Todas las Ligas</option>`;

            let ligaSet = new Set();
            const filtered = registro.filter(item => {
                const match = item.liga.toLowerCase().includes(fLiga) &&
                    (fMercado === "" || item.mercado === fMercado) &&
                    (item.cuota >= fCuota);
                if (match) ligaSet.add(item.liga);
                return match;
            });

            [...ligaSet].forEach(liga => {
                const option = document.createElement('option');
                option.value = liga;
                option.textContent = liga;
                ligaDropdown.appendChild(option);
            });

            filtered.reverse().forEach(apuesta => {
                const tr = document.createElement('tr');
                const probRangoStr = apuesta.probRango ? ` | <span class="text-cyan-500">16-45: ${apuesta.probRango}</span>` : "";

                tr.innerHTML = `
                    <td>
                        <div class="font-bold text-cyan-400">${apuesta.liga}</div>
                        <div class="text-[8px] text-slate-500">${apuesta.fecha}</div>
                    </td>
                    <td>${apuesta.evento}</td>
                    <td>
                        <div class="font-semibold">${apuesta.mercado}</div>
                        <div class="text-[9px] text-slate-400">Modelo: ${apuesta.prob}${probRangoStr}</div>
                    </td>
                    <td>
                        <div class="flex items-center gap-1">
                            <span class="text-slate-500">Min:</span>
                            <input type="number" value="${apuesta.minuto}" 
                                onchange="updateMinuto(${apuesta.id}, this.value)" 
                                class="editable-input text-blue-400 font-semibold">
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-slate-500">@</span>
                            <input type="number" step="0.01" value="${parseFloat(apuesta.cuota).toFixed(2)}" 
                                onchange="updateCuota(${apuesta.id}, this.value)" 
                                class="editable-input text-white font-bold">
                        </div>
                    </td>
                    <td>
                        <select onchange="updateStatus(${apuesta.id}, this.value)" class="input-field text-[10px] ${getStatusClass(apuesta.estado)}">
                            <option value="Pendiente" ${apuesta.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option value="Ganada" ${apuesta.estado === 'Ganada' ? 'selected' : ''}>Ganada</option>
                            <option value="Perdida" ${apuesta.estado === 'Perdida' ? 'selected' : ''}>Perdida</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="deleteApuesta(${apuesta.id})" class="text-red-500 hover:text-red-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                cuerpo.appendChild(tr);
            });
            calculateStats(filtered);
        }

        function filterSelectedLiga() {
            const selectedLiga = document.getElementById('ligaSelect').value;
            document.getElementById('filterLiga').value = selectedLiga;
            renderTable();
        }

        function calculateStats(data) {
            const finished = data.filter(a => a.estado !== "Pendiente");
            if (finished.length === 0) {
                document.getElementById('statWinRate').innerText = "0%";
                document.getElementById('statYield').innerText = "0%";
                document.getElementById('statDrawdown').innerText = "0u";
                document.getElementById('statPValue').innerText = "0.00";
                document.getElementById('statProfit').innerText = "0 u";
                return;
            }

            const wins = finished.filter(a => a.estado === "Ganada").length;
            const winRate = (wins / finished.length) * 100;

            let profit = 0;
            let turnover = finished.length;
            let currentDrawdown = 0;
            let maxDrawdown = 0;
            let peak = 0;
            let balance = 0;

            finished.forEach(a => {
                if (a.estado === "Ganada") {
                    balance += parseFloat(a.cuota) - 1;
                } else {
                    balance -= 1;
                }
                if (balance > peak) peak = balance;
                currentDrawdown = peak - balance;
                if (currentDrawdown > maxDrawdown) maxDrawdown = currentDrawdown;
            });

            const yieldVal = (balance / turnover) * 100;

            const avgOdds = finished.reduce((acc, cur) => acc + parseFloat(cur.cuota), 0) / finished.length;
            const expectedWinRate = 1 / avgOdds;
            const expectedWins = finished.length * expectedWinRate;
            const sd = Math.sqrt(finished.length * expectedWinRate * (1 - expectedWinRate));
            const zScore = sd === 0 ? 0 : (wins - expectedWins) / sd;
            let pValue = 0.5;

            if (zScore !== 0) {
                const t = 1 / (1 + 0.2316419 * Math.abs(zScore));
                const d = 0.3989422804014327 * Math.exp(-0.5 * zScore * zScore);
                pValue = d * t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
                if (zScore > 0) pValue = 1 - pValue;
            }

            document.getElementById('statWinRate').innerText = winRate.toFixed(1) + "%";
            document.getElementById('statYield').innerText = (yieldVal > 0 ? "+" : "") + yieldVal.toFixed(2) + "%";
            document.getElementById('statDrawdown').innerText = maxDrawdown.toFixed(2) + " u";
            document.getElementById('statPValue').innerText = pValue.toFixed(4);
            document.getElementById('statProfit').innerText = balance.toFixed(2) + " u";

            const pBox = document.getElementById('statPValue');
            pBox.className = "text-2xl font-black " + (pValue < 0.05 ? "text-emerald-400" : "text-white");
        }

        function updateStatus(id, newStatus) {
            let registro = JSON.parse(localStorage.getItem('betags_registro')) || [];
            const index = registro.findIndex(a => a.id === id);
            if (index !== -1) {
                registro[index].estado = newStatus;
                localStorage.setItem('betags_registro', JSON.stringify(registro));
                renderTable();
            }
        }

        function updateMinuto(id, newMin) {
            let registro = JSON.parse(localStorage.getItem('betags_registro')) || [];
            const index = registro.findIndex(a => a.id === id);
            if (index !== -1) {
                registro[index].minuto = parseInt(newMin) || 0;
                localStorage.setItem('betags_registro', JSON.stringify(registro));
            }
        }

        function updateCuota(id, newCuota) {
            let registro = JSON.parse(localStorage.getItem('betags_registro')) || [];
            const index = registro.findIndex(a => a.id === id);
            if (index !== -1) {
                registro[index].cuota = parseFloat(newCuota) || 1.01;
                localStorage.setItem('betags_registro', JSON.stringify(registro));
                renderTable();
            }
        }

        function deleteApuesta(id) {
            if (confirm("¿Seguro que quieres borrar esta apuesta?")) {
                let registro = JSON.parse(localStorage.getItem('betags_registro')) || [];
                registro = registro.filter(a => a.id !== id);
                localStorage.setItem('betags_registro', JSON.stringify(registro));
                renderTable();
            }
        }

        function clearAll() {
            if (confirm("¡ATENCIÓN! ¿Estás seguro de borrar TODO el historial? Esta acción no se puede deshacer.")) {
                localStorage.removeItem('betags_registro');
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
