<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS - Base de Datos Cuántica v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .input-field { width: 100%; background-color: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.875rem; outline: none; transition: all 0.3s; color: #22d3ee; }
        .input-field:focus { border-color: #22d3ee; ring: 2px ring-cyan-500; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn { transition: all 0.3s; border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { border-bottom: 2px solid #22d3ee; color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .league-item { transition: all 0.2s; border-left: 0px solid #22d3ee; }
        .league-item:hover { background: rgba(34, 211, 238, 0.1); border-left: 4px solid #22d3ee; padding-left: 12px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .outdated-league { color: #ccff00 !important; text-shadow: 0 0 5px rgba(204, 255, 0, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8 text-xs">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 inline-block">
                    Centro de Datos <span class="text-sm font-light text-slate-500">v4.2</span>
                </h1>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest">Gestión de Parámetros Estadísticos Avanzados</p>
            </div>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Volver al Engine
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass-card p-6 rounded-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[9px] font-bold text-cyan-400 uppercase block">Nueva Liga / Editar</label>
                        <span id="lastUpdatedDisplay" class="text-[8px] text-slate-500 italic"></span>
                    </div>
                    <input id="leagueName" type="text" placeholder="Ej: Premier League" class="input-field mb-4">
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="saveAllData()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-widest">
                            Guardar Todo
                        </button>
                        <button onclick="updateLeagueData()" class="w-full bg-slate-700 hover:bg-slate-600 text-cyan-400 font-bold py-2 rounded-xl transition-all uppercase tracking-widest text-[9px]">
                            Actualizar Existente
                        </button>
                        <button onclick="clearFields()" class="w-full bg-red-900/20 hover:bg-red-900/40 text-red-400 border border-red-500/30 font-bold py-2 rounded-xl transition-all uppercase tracking-widest text-[9px] mt-2">
                            Limpiar Campos
                        </button>
                    </div>
                    <p id="saveStatus" class="text-center mt-4 text-green-400 font-bold hidden">¡Datos Actualizados!</p>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 flex justify-between">
                        Ligas en Base de Datos
                        <span id="leagueCount" class="text-cyan-500">0</span>
                    </h3>
                    <div id="leagueList" class="space-y-1 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-card rounded-2xl overflow-hidden">
                    <div class="flex border-b border-slate-700 bg-slate-800/30 overflow-x-auto custom-scrollbar">
                        <button onclick="openTab(event, 'tabLocal')" class="tab-btn active px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Grales Local</button>
                        <button onclick="openTab(event, 'tabAway')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Grales Visita</button>
                        <button onclick="openTab(event, 'tabTiemposLocal')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Min. Goles (L)</button>
                        <button onclick="openTab(event, 'tabTiemposAway')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Min. Goles (V)</button>
                        <button onclick="openTab(event, 'tabLeadHome')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Lead Dur. (L)</button>
                        <button onclick="openTab(event, 'tabLeadAway')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Lead Dur. (V)</button>
                        <button onclick="openTab(event, 'tabEqualHome')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Equalizers (L)</button>
                        <button onclick="openTab(event, 'tabEqualAway')" class="tab-btn px-4 py-4 font-bold uppercase tracking-wider text-[9px]">Equalizers (V)</button>
                    </div>

                    <div class="p-6">
                        <div id="tabLocal" class="tab-content active space-y-4">
                            <textarea id="dataLocal" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí la tabla de local (General)..."></textarea>
                        </div>
                        <div id="tabAway" class="tab-content space-y-4">
                            <textarea id="dataAway" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí la tabla de visitante (General)..."></textarea>
                        </div>
                        <div id="tabTiemposLocal" class="tab-content space-y-4">
                            <textarea id="dataTimesLocal" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí la tabla: Goals per time segment (at home)..."></textarea>
                        </div>
                        <div id="tabTiemposAway" class="tab-content space-y-4">
                            <textarea id="dataTimesAway" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí la tabla: Goals per time segment (away)..."></textarea>
                        </div>
                        <div id="tabLeadHome" class="tab-content space-y-4">
                            <textarea id="dataLeadHome" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí: Lead durations (at home) in percentage..."></textarea>
                        </div>
                        <div id="tabLeadAway" class="tab-content space-y-4">
                            <textarea id="dataLeadAway" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí: Lead durations (away) in percentage..."></textarea>
                        </div>
                        <div id="tabEqualHome" class="tab-content space-y-4">
                            <textarea id="dataEqualHome" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí: Equalizers scored (at home)..."></textarea>
                        </div>
                        <div id="tabEqualAway" class="tab-content space-y-4">
                            <textarea id="dataEqualAway" class="input-field h-80 font-mono text-[10px]" placeholder="Pega aquí: Equalizers scored (away)..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName('tab-content');
            const buttons = document.getElementsByClassName('tab-btn');
            for (let content of contents) content.classList.remove('active');
            for (let btn of buttons) btn.classList.remove('active');
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function saveAllData() {
            const league = document.getElementById('leagueName').value.trim();
            if (!league) { alert("Por favor, ingresa el nombre de la liga."); return; }
            const now = new Date().toISOString();
            const leagueData = {
                local: document.getElementById('dataLocal').value,
                away: document.getElementById('dataAway').value,
                timesLocal: document.getElementById('dataTimesLocal').value,
                timesAway: document.getElementById('dataTimesAway').value,
                leadHome: document.getElementById('dataLeadHome').value,
                leadAway: document.getElementById('dataLeadAway').value,
                equalHome: document.getElementById('dataEqualHome').value,
                equalAway: document.getElementById('dataEqualAway').value,
                lastUpdated: now
            };
            let allLeagues = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            allLeagues[league] = leagueData;
            localStorage.setItem('betags_leagues_db', JSON.stringify(allLeagues));
            renderLeagueList();
            showStatus();
            document.getElementById('lastUpdatedDisplay').innerText = new Date(now).toLocaleString();
        }

        function updateLeagueData() {
            const league = document.getElementById('leagueName').value.trim();
            let allLeagues = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            if (!league || !allLeagues[league]) return;
            const now = new Date().toISOString();
            
            allLeagues[league].local = document.getElementById('dataLocal').value;
            allLeagues[league].away = document.getElementById('dataAway').value;
            allLeagues[league].timesLocal = document.getElementById('dataTimesLocal').value;
            allLeagues[league].timesAway = document.getElementById('dataTimesAway').value;
            allLeagues[league].leadHome = document.getElementById('dataLeadHome').value;
            allLeagues[league].leadAway = document.getElementById('dataLeadAway').value;
            allLeagues[league].equalHome = document.getElementById('dataEqualHome').value;
            allLeagues[league].equalAway = document.getElementById('dataEqualAway').value;
            allLeagues[league].lastUpdated = now;
            
            localStorage.setItem('betags_leagues_db', JSON.stringify(allLeagues));
            renderLeagueList();
            showStatus();
            document.getElementById('lastUpdatedDisplay').innerText = new Date(now).toLocaleString();
        }

        function showStatus() {
            const status = document.getElementById('saveStatus');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }

        function renderLeagueList() {
            const listElement = document.getElementById('leagueList');
            const allLeagues = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            const sortedLeagues = Object.keys(allLeagues).sort();
            document.getElementById('leagueCount').innerText = sortedLeagues.length;
            listElement.innerHTML = '';
            
            const now = new Date();

            sortedLeagues.forEach(league => {
                const data = allLeagues[league];
                let isOutdated = false;
                
                if (data.lastUpdated) {
                    const lastUpdate = new Date(data.lastUpdated);
                    const diffTime = Math.abs(now - lastUpdate);
                    const diffDays = diffTime / (1000 * 60 * 60 * 24);
                    if (diffDays > 3) isOutdated = true;
                }

                const item = document.createElement('div');
                item.className = 'league-item p-2 cursor-pointer text-slate-400 hover:text-cyan-400 flex justify-between items-center group';
                
                const neonClass = isOutdated ? 'outdated-league' : '';

                item.innerHTML = `<span onclick="loadLeague('${league}')" class="flex-1 italic ${neonClass}">${league}</span>
                    <button onclick="deleteLeague('${league}')" class="opacity-0 group-hover:opacity-100 text-red-500 px-2">×</button>`;
                listElement.appendChild(item);
            });
        }

        function loadLeague(name) {
            const allLeagues = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            const data = allLeagues[name];
            document.getElementById('leagueName').value = name;
            document.getElementById('dataLocal').value = data.local || '';
            document.getElementById('dataAway').value = data.away || '';
            document.getElementById('dataTimesLocal').value = data.timesLocal || '';
            document.getElementById('dataTimesAway').value = data.timesAway || '';
            document.getElementById('dataLeadHome').value = data.leadHome || '';
            document.getElementById('dataLeadAway').value = data.leadAway || '';
            document.getElementById('dataEqualHome').value = data.equalHome || '';
            document.getElementById('dataEqualAway').value = data.equalAway || '';
            
            if (data.lastUpdated) {
                document.getElementById('lastUpdatedDisplay').innerText = new Date(data.lastUpdated).toLocaleString();
            } else {
                document.getElementById('lastUpdatedDisplay').innerText = '';
            }
        }

        function deleteLeague(name) {
            if(confirm(`¿Eliminar "${name}"?`)) {
                let allLeagues = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
                delete allLeagues[name];
                localStorage.setItem('betags_leagues_db', JSON.stringify(allLeagues));
                renderLeagueList();
            }
        }

        function clearFields() {
            document.getElementById('leagueName').value = '';
            document.getElementById('dataLocal').value = '';
            document.getElementById('dataAway').value = '';
            document.getElementById('dataTimesLocal').value = '';
            document.getElementById('dataTimesAway').value = '';
            document.getElementById('dataLeadHome').value = '';
            document.getElementById('dataLeadAway').value = '';
            document.getElementById('dataEqualHome').value = '';
            document.getElementById('dataEqualAway').value = '';
            document.getElementById('lastUpdatedDisplay').innerText = '';
        }

        window.onload = () => renderLeagueList();
    </script>
</body>
</html>
