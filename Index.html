<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora Poisson + EV</title>
  <style>
    :root {
      --azul: #3498db;
      --azul-escuro: #2980b9;
      --cinza-claro: #f0f2f5;
      --cinza: #ecf0f1;
      --texto: #2c3e50;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--cinza-claro);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      width: 100%;
    }
    h2, h3 {
      text-align: center;
      color: var(--texto);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: var(--texto);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: var(--azul);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: var(--azul-escuro);
    }
    .section {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 5px;
      color: var(--texto);
    }
    .resultados-extra {
      background: var(--cinza);
      border-radius: 8px;
      padding: 10px 15px;
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
      color: var(--texto);
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      display: block;
      overflow-x: auto;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
      min-width: 60px;
    }
    th {
      background-color: var(--azul);
      color: white;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: -5px;
      margin-bottom: 10px;
    }
    .btn-group button {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
      background-color: #27ae60;
    }
    .btn-group button:hover {
      background-color: #1e8449;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Calculadora Poisson + EV</h2>

    <div class="section">
      <h3>1️⃣ Calcular Média Universal</h3>
      <label>Tipo de Evento:</label>
      <select id="tipo_evento">
        <option value="Gols">Gols</option>
        <option value="Escanteios">Escanteios</option>
      </select>
      <label>Total de Ocorrências:</label>
      <input type="number" id="gols" placeholder="Ex: 9" step="any" />
      <label>Total de Partidas:</label>
      <input type="number" id="partidas" placeholder="Ex: 5" step="any" />
      <button onclick="calcularMedia()">Calcular Média</button>
      <label>Média Calculada:</label>
      <input type="text" id="media_resultado" readonly />

      <div class="btn-group" style="display:none;" id="btnsAdicionarMedia">
        <button onclick="adicionarMedia('timeA')">Usar no Time A</button>
        <button onclick="adicionarMedia('timeB')">Usar no Time B</button>
      </div>
    </div>

    <div class="section">
      <h3>2️⃣ Aplicar Poisson (Probabilidades do Jogo)</h3>
      <label>Média de gols Marcados (Time A):</label>
      <input type="number" id="gols_marcados" placeholder="Ex: 1.8" step="0.01" />
      <label>Média de gols Sofridos (Time B):</label>
      <input type="number" id="gols_sofridos" placeholder="Ex: 1.4" step="0.01" />
      <label>Máximo de gols para análise:</label>
      <input type="number" id="limite" value="5" min="1" max="10" />
      <button onclick="calcularPoisson()">Calcular Probabilidades</button>
      <ul id="resultado"></ul>
      <div class="resultados-extra" id="resumo_extra"></div>
    </div>

    <div class="section">
      <h3>3️⃣ Placar Exato</h3>
      <label>Média esperada - Time A:</label>
      <input type="number" id="media_a" placeholder="Ex: 1.6" step="0.01" />
      <label>Média esperada - Time B:</label>
      <input type="number" id="media_b" placeholder="Ex: 1.2" step="0.01" />
      <button onclick="placarExato()">Gerar Matriz de Placares</button>
      <div id="placares_tabela"></div>
    </div>

    <div class="section">
      <h3>4️⃣ Calculadora de Valor Esperado (EV)</h3>
      <label>Probabilidade Calculada (%):</label>
      <input type="number" id="prob_ev" placeholder="Ex: 65" step="0.1" />
      <label>Odd da Casa:</label>
      <input type="number" id="odd_ev" placeholder="Ex: 1.90" step="0.01" />
      <button onclick="calcularEV()">Calcular EV</button>
      <div class="resultados-extra" id="resultado_ev"></div>
    </div>

    <div class="section">
      <h3>5️⃣ Previsão de Escanteios</h3>
      <label>Média escanteios Pro (Time A):</label>
      <input type="number" id="escanteios_favor" placeholder="Ex: 6.2" step="0.1" />
      <label>Média escanteios Contra (Time B):</label>
      <input type="number" id="escanteios_contra" placeholder="Ex: 5.8" step="0.1" />
      <label>Máximo de escanteios:</label>
      <input type="number" id="escanteios_limite" value="12" min="1" max="20" />
      <button onclick="calcularEscanteios()">Calcular Escanteios</button>
      <ul id="resultado_escanteios"></ul>
      <div class="resultados-extra" id="resumo_escanteios"></div>
    </div>
  </div>

  <script>
    // Função fatorial otimizada
    function fatorial(n) {
      let res = 1;
      for (let i = 2; i <= n; i++) res *= i;
      return res;
    }

    // Fórmula de Poisson: (e^-λ * λ^x) / x!
    function poisson(lambda, x) {
      return (Math.exp(-lambda) * Math.pow(lambda, x)) / fatorial(x);
    }

    function calcularMedia() {
      const tipo = document.getElementById("tipo_evento").value;
      const gols = parseFloat(document.getElementById("gols").value);
      const partidas = parseFloat(document.getElementById("partidas").value);
      
      if (!gols || !partidas) {
        alert("Preencha os campos.");
        return;
      }
      
      const media = (gols / partidas).toFixed(2);
      document.getElementById("media_resultado").value = media;
      document.getElementById("btnsAdicionarMedia").style.display = "flex";
      window.mediaCalculada = media;
      window.tipoEvento = tipo;
    }

    function adicionarMedia(time) {
      const media = window.mediaCalculada;
      if (window.tipoEvento === "Gols") {
        if (time === 'timeA') {
          document.getElementById("gols_marcados").value = media;
          document.getElementById("media_a").value = media;
        } else {
          document.getElementById("gols_sofridos").value = media;
          document.getElementById("media_b").value = media;
        }
      } else {
        if (time === 'timeA') document.getElementById("escanteios_favor").value = media;
        else document.getElementById("escanteios_contra").value = media;
      }
    }

    function calcularPoisson() {
      const marcados = parseFloat(document.getElementById("gols_marcados").value);
      const sofridos = parseFloat(document.getElementById("gols_sofridos").value);
      const limite = parseInt(document.getElementById("limite").value);
      
      if (isNaN(marcados) || isNaN(sofridos)) return;

      // CORREÇÃO: A média combinada para o total do jogo é a SOMA das médias
      const lambdaTotal = marcados + sofridos;
      
      let html = "", over25 = 0, under25 = 0;

      for (let x = 0; x <= limite; x++) {
        const p = poisson(lambdaTotal, x);
        html += `<li>${x} gol(s) no total: ${(p * 100).toFixed(2)}%</li>`;
        if (x <= 2) under25 += p;
        else over25 += p;
      }

      // Probabilidade de BTTS (Ambos Marcam) simplificada para este contexto
      // Prob de pelo menos 1 gol cada: (1-P(0,mediaA)) * (1-P(0,mediaB))
      const btts = (1 - poisson(marcados, 0)) * (1 - poisson(sofridos, 0));

      document.getElementById("resultado").innerHTML = html;
      document.getElementById("resumo_extra").innerHTML = `
        <p>🔼 Over 2.5: ${(over25 * 100).toFixed(2)}%</p>
        <p>🔽 Under 2.5: ${(under25 * 100).toFixed(2)}%</p>
        <p>⚽ Ambos Marcam (BTTS): ${(btts * 100).toFixed(2)}%</p>
      `;
    }

    function placarExato() {
      const mediaA = parseFloat(document.getElementById("media_a").value);
      const mediaB = parseFloat(document.getElementById("media_b").value);
      if (isNaN(mediaA) || isNaN(mediaB)) return;

      let html = "<table><tr><th>A \\ B</th>";
      for (let b = 0; b <= 4; b++) html += `<th>${b}</th>`;
      html += "</tr>";

      for (let a = 0; a <= 4; a++) {
        html += `<tr><th>${a}</th>`;
        for (let b = 0; b <= 4; b++) {
          const prob = (poisson(mediaA, a) * poisson(mediaB, b) * 100).toFixed(1);
          html += `<td>${prob}%</td>`;
        }
        html += "</tr>";
      }
      html += "</table>";
      document.getElementById("placares_tabela").innerHTML = html;
    }

    function calcularEV() {
      const prob = parseFloat(document.getElementById("prob_ev").value);
      const odd = parseFloat(document.getElementById("odd_ev").value);
      if (!prob || !odd) return;
      
      const ev = ((prob / 100) * odd) - 1;
      const cor = ev > 0 ? "#27ae60" : "#c0392b";
      document.getElementById("resultado_ev").innerHTML = `<span style="color:${cor}">EV: ${(ev * 100).toFixed(2)}%</span>`;
    }

    function calcularEscanteios() {
      const favor = parseFloat(document.getElementById("escanteios_favor").value);
      const contra = parseFloat(document.getElementById("escanteios_contra").value);
      const limite = parseInt(document.getElementById("escanteios_limite").value);
      
      if (isNaN(favor) || isNaN(contra)) return;

      // CORREÇÃO: Soma das médias para o total
      const lambda = favor + contra;
      let html = "", over85 = 0;

      for (let x = 0; x <= limite; x++) {
        const p = poisson(lambda, x);
        html += `<li>${x} escanteios: ${(p * 100).toFixed(2)}%</li>`;
        if (x > 8) over85 += p;
      }

      document.getElementById("resultado_escanteios").innerHTML = html;
      document.getElementById("resumo_escanteios").innerHTML = `Probabilidade Over 8.5: ${(over85 * 100).toFixed(2)}%`;
    }
  </script>
</body>
</html>
