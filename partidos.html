<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS - Organizador de Partidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .league-header { background: linear-gradient(90deg, #1e293b 0%, #334155 100%); border-left: 4px solid #22d3ee; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .score-badge { background: #0ea5e9; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body class="p-4 md:p-8 text-xs">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400">Partidos del Día</h1>
            <div class="flex gap-2">
                <button onclick="clearMatches()" class="btn-secondary px-4 py-2 rounded-lg font-semibold text-[10px] uppercase flex items-center gap-2">Limpiar Historial</button>
                <a href="index.html" class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 hover:border-cyan-400 transition-all font-semibold text-[10px] uppercase">Volver al Motor</a>
            </div>
        </header>

        <div class="glass-card p-6 rounded-2xl mb-8">
            <textarea id="rawInput" class="w-full h-40 bg-slate-900 border border-slate-700 rounded-xl p-4 text-cyan-300 outline-none" placeholder="Pega los partidos de Soccerstats o BeSoccer aquí..."></textarea>
            <button onclick="processMatches()" class="w-full mt-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-widest">Organizar y Guardar</button>
        </div>

        <div id="resultsContainer" class="space-y-6"></div>
    </div>

    <script>
        const LEAGUE_PRIORITY = { "Brasil": 1, "España": 2, "Colombia": 3, "Paraguay": 4, "Uruguay": 5 };

        function processMatches() {
            const input = document.getElementById('rawInput').value;
            const lines = input.split('\n');
            const organized = {};
            
            lines.forEach(line => {
                const clean = line.split(/\t|\s{2,}/).map(p => p.trim()).filter(p => p !== "");
                
                // La estructura mínima esperada con datos de GP suele ser de 5 o más columnas en Soccerstats
                if (clean.length >= 3) {
                    const time = clean[0];
                    const home = clean[1];
                    const middle = clean[2];
                    let away = clean[3] || "TBD";
                    
                    if (time.includes(':')) {
                        const l = detectLeague(home, away);
                        
                        // FILTRO POR PROMEDIO DE PARTIDOS JUGADOS (GP)
                        // Buscamos valores numéricos que representen GP Local y GP Visitante
                        // En Soccerstats, suelen estar después de los nombres de los equipos
                        let gpHome = parseInt(clean[clean.indexOf(home) + 1]) || 0;
                        let gpAway = parseInt(clean[clean.indexOf(away) + 1]) || 0;

                        // Si no se detectan en esa posición, intentamos buscarlos al final del array
                        if (isNaN(gpHome) || gpHome === 0) gpHome = parseInt(clean[clean.length - 2]) || 0;
                        if (isNaN(gpAway) || gpAway === 0) gpAway = parseInt(clean[clean.length - 1]) || 0;

                        const averageGP = (gpHome + gpAway) / 2;

                        // MEJORA: Solo añadir si la liga NO es "Otras Ligas" Y el promedio de GP >= 5
                        if (l !== "Otras Ligas" && averageGP >= 5) {
                            if (!organized[l]) organized[l] = [];
                            organized[l].push({ time, home, away, score: middle.includes(':') ? middle : null });
                        }
                    }
                }
            });
            
            localStorage.setItem('betags_daily_matches', JSON.stringify(organized));
            renderMatches(organized);
        }

        function renderMatches(organized) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";
            
            // Si el objeto está vacío tras el filtro, mostrar mensaje
            if (Object.keys(organized).length === 0) {
                container.innerHTML = "<div class='text-center text-slate-500 py-10'>No hay partidos que cumplan el promedio de GP ≥ 5.</div>";
                return;
            }

            Object.keys(organized).forEach(league => {
                const section = document.createElement('div');
                section.className = "glass-card rounded-xl overflow-hidden mb-4";
                let html = `<div class="league-header px-4 py-2 font-bold text-cyan-300 uppercase">${league}</div><div class="divide-y divide-slate-700/50">`;
                
                organized[league].forEach(m => {
                    html += `<div class="px-4 py-3 flex items-center justify-between">
                        <span class="text-slate-500 font-mono w-12">${m.time}</span>
                        <div class="flex-1 flex justify-center items-center gap-4 text-sm font-semibold">
                            <span class="flex-1 text-right">${m.home}</span>
                            ${m.score ? `<span class="score-badge">${m.score}</span>` : `<span class="text-xs text-slate-600">vs</span>`}
                            <span class="flex-1 text-left">${m.away}</span>
                        </div>
                    </div>`;
                });
                
                section.innerHTML = html + `</div>`;
                container.appendChild(section);
            });
        }

        function clearMatches() { if(confirm("¿Limpiar todo?")) { localStorage.removeItem('betags_daily_matches'); location.reload(); } }
        
        function detectLeague(h, v) { 
            const n = (h + " " + v).toUpperCase();
            
            const db = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            for (const [leagueName, data] of Object.entries(db)) {
                if (data.local && (data.local.toUpperCase().includes(h.toUpperCase()) || data.local.toUpperCase().includes(v.toUpperCase()))) {
                    return leagueName;
                }
                if (data.away && (data.away.toUpperCase().includes(h.toUpperCase()) || data.away.toUpperCase().includes(v.toUpperCase()))) {
                    return leagueName;
                }
            }

            if (n.includes("BRASIL") || n.includes("CRUZEIRO") || n.includes("FLAMENGO")) return "Brasil - Serie A";
            if (n.includes("ESPAÑA") || n.includes("ALBACETE") || n.includes("CADIZ")) return "España - LaLiga 2";
            
            return "Otras Ligas";
        }

        window.onload = () => { 
            const saved = localStorage.getItem('betags_daily_matches');
            if(saved) renderMatches(JSON.parse(saved)); 
        };
    </script>
</body>
</html>
