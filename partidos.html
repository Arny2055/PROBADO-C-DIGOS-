<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetAGS - Organizador de Partidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .league-header { background: linear-gradient(90deg, #1e293b 0%, #334155 100%); border-left: 4px solid #22d3ee; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .btn-secondary:hover { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }
        
        /* Estilos del Modal */
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .prob-pill { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0.75rem; padding: 0.4rem; }
        .range-table { width: 100%; border-collapse: separate; border-spacing: 0 2px; font-size: 9px; }
        .range-table th { color: #64748b; padding: 4px; text-transform: uppercase; }
        .range-table td { background: rgba(30, 41, 59, 0.6); padding: 4px; text-align: center; border-radius: 4px; }
        .prob-green { color: #10b981; font-weight: 800; }
        .prob-yellow { color: #fbbf24; font-weight: 800; }
        .prob-red { color: #f43f5e; font-weight: 800; }
    </style>
</head>
<body class="p-4 md:p-8 text-xs">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400">Partidos del Día</h1>
            <div class="flex gap-2">
                <button onclick="clearMatches()" class="btn-secondary px-4 py-2 rounded-lg font-semibold text-[10px] uppercase tracking-wider flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Limpiar Historial
                </button>
                <a href="index.html" class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 hover:border-cyan-400 transition-all font-semibold text-[10px] uppercase tracking-wider">Volver al Motor</a>
            </div>
        </header>

        <div class="glass-card p-6 rounded-2xl mb-8">
            <label class="block text-cyan-500 font-bold uppercase mb-2 text-[10px]">Pega aquí los partidos (formato tabla):</label>
            <textarea id="rawInput" class="w-full h-40 bg-slate-900 border border-slate-700 rounded-xl p-4 text-cyan-300 outline-none focus:border-cyan-500" placeholder="Pega los partidos aquí..."></textarea>
            <button onclick="processMatches()" class="w-full mt-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-widest">
                Organizar y Guardar
            </button>
        </div>

        <div id="resultsContainer" class="space-y-6"></div>
    </div>

    <div id="probModal" class="modal" onclick="closeModal(event)">
        <div class="glass-card w-full max-w-2xl p-6 rounded-2xl border-t-4 border-cyan-500 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 id="modalTeams" class="text-lg font-bold text-white">Nombre Equipos</h2>
                    <p id="modalLeague" class="text-[10px] text-cyan-400 uppercase font-bold tracking-widest"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-3 bg-slate-800/50 rounded-xl border border-cyan-500/30">
                    <p class="text-[9px] text-slate-400 uppercase font-bold mb-2">1er Tiempo (HT)</p>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-bold text-white">Over 0.5 HT</span>
                        <span id="mO05HT" class="text-2xl font-black text-cyan-400">-</span>
                    </div>
                    <div class="grid grid-cols-3 gap-1 text-[8px] text-center uppercase">
                        <div class="prob-pill"><p class="text-blue-400">L</p><p id="m1HT" class="font-bold">-</p></div>
                        <div class="prob-pill"><p class="text-slate-400">X</p><p id="mXHT" class="font-bold">-</p></div>
                        <div class="prob-pill"><p class="text-green-400">V</p><p id="m2HT" class="font-bold">-</p></div>
                    </div>
                </div>
                <div class="p-3 bg-slate-800/50 rounded-xl border border-emerald-500/30">
                    <p class="text-[9px] text-slate-400 uppercase font-bold mb-2">2do Tiempo (2T)</p>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-bold text-white">Over 0.5 2T</span>
                        <span id="mO05_2T" class="text-2xl font-black text-emerald-400">-</span>
                    </div>
                    <div class="grid grid-cols-3 gap-1 text-[8px] text-center uppercase">
                        <div class="prob-pill"><p class="text-blue-400">L</p><p id="m1_2T" class="font-bold">-</p></div>
                        <div class="prob-pill"><p class="text-slate-400">X</p><p id="mX_2T" class="font-bold">-</p></div>
                        <div class="prob-pill"><p class="text-green-400">V</p><p id="m2_2T" class="font-bold">-</p></div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <h3 class="text-[9px] font-bold uppercase text-yellow-500 mb-2">Rangos (15 min)</h3>
                    <table class="range-table">
                        <thead><tr><th>Rango</th><th>xG</th><th>O 0.5</th><th>1</th><th>X</th><th>2</th></tr></thead>
                        <tbody id="mTable15"></tbody>
                    </table>
                </div>
                <div>
                    <h3 class="text-[9px] font-bold uppercase text-purple-500 mb-2">Rangos (30 min)</h3>
                    <table class="range-table">
                        <thead><tr><th>Rango</th><th>xG</th><th>O 0.5</th><th>1</th><th>X</th><th>2</th></tr></thead>
                        <tbody id="mTable30"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE PARTIDOS (MANTENIDA) ---
        const LEAGUE_PRIORITY = {
            "Brasil - Serie A / B / Paulista": 1, "España - LaLiga 2": 2, "Colombia - Primera / Ascenso": 3,
            "Paraguay - Primera División": 4, "Uruguay - Primera / Segunda": 5,
            "Amistosos Internacionales / Nations": 6, "Otras Ligas / Copa": 7,
            "Femenil / Women's League": 8, "Juveniles / Development League": 9
        };

        window.onload = () => {
            const saved = localStorage.getItem('betags_daily_matches');
            if (saved) renderMatches(JSON.parse(saved));
        };

        // --- LÓGICA DE CÁLCULO (INCORPORADA DE INDEX.HTML) ---
        function factorial(n) { return (n <= 1) ? 1 : n * factorial(n - 1); }
        function poisson(k, lambda) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function getMatchAnalytics(league, home, away) {
            const db = JSON.parse(localStorage.getItem('betags_leagues_db')) || {};
            if (!db[league]) return null;

            const homeData = parseStandingsTable(db[league].local);
            const awayData = parseStandingsTable(db[league].away);
            
            if (!homeData.teams[home] || !awayData.teams[away]) return null;

            const avgLH = homeData.leagueAvg;
            const avgLV = awayData.leagueAvg;
            const gfH = homeData.teams[home].avgGf;
            const gaH = homeData.teams[home].avgGa;
            const gfV = awayData.teams[away].avgGf;
            const gaV = awayData.teams[away].avgGa;

            const segH = getSegmentsArray(db[league].timesLocal, home);
            const segV = getSegmentsArray(db[league].timesAway, away);
            
            const perH_HT = (segH.slice(0,3).reduce((a,b)=>a+b,0) / 100);
            const perV_HT = (segV.slice(0,3).reduce((a,b)=>a+b,0) / 100);

            const xG_FT_H = (gfH / avgLH) * (gaV / avgLV) * avgLH;
            const xG_FT_V = (gfV / avgLV) * (gaH / avgLH) * avgLV;

            return { xfH: xG_FT_H, xfV: xG_FT_V, pH: perH_HT, pV: perV_HT, segH, segV };
        }

        function parseStandingsTable(text) {
            if (!text) return { teams: {}, leagueAvg: 1.5 };
            const lines = text.split('\n');
            const data = {}; let totalGf = 0, totalGp = 0;
            lines.forEach(line => {
                const parts = line.split('\t').filter(p => p.trim() !== "");
                if (parts.length >= 7) {
                    const name = parts[1].trim();
                    const gp = parseFloat(parts[2]), gf = parseFloat(parts[6]), ga = parseFloat(parts[7]);
                    if (!isNaN(gp) && gp > 0) {
                        data[name] = { avgGf: gf / gp, avgGa: ga / gp };
                        totalGf += gf; totalGp += gp;
                    }
                }
            });
            return { teams: data, leagueAvg: totalGp > 0 ? (totalGf / totalGp) : 1.3 };
        }

        function getSegmentsArray(text, teamName) {
            if (!text) return [16.6, 16.6, 16.6, 16.6, 16.6, 16.6];
            const lines = text.split('\n');
            for (let line of lines) {
                const parts = line.split('\t').filter(p => p.trim() !== "");
                if (parts.length >= 7 && parts[0].trim() === teamName) {
                    const g = parts.slice(1, 7).map(val => parseInt(val.split('-')[0]) || 0);
                    const total = g.reduce((a, b) => a + b, 0);
                    return total === 0 ? [16.6, 16.6, 16.6, 16.6, 16.6, 16.6] : g.map(v => (v / total) * 100);
                }
            }
            return [16.6, 16.6, 16.6, 16.6, 16.6, 16.6];
        }

        function openQuickAnalysis(league, home, away) {
            const data = getMatchAnalytics(league, home, away);
            if (!data) { alert("Datos insuficientes en Base de Datos para este partido."); return; }

            document.getElementById('modalTeams').innerText = `${home} vs ${away}`;
            document.getElementById('modalLeague').innerText = league;

            // HT Probs
            const xH_HT = data.xfH * data.pH;
            const xV_HT = data.xfV * data.pV;
            renderSectionProbs(xH_HT, xV_HT, 'mO05HT', 'm1HT', 'mXHT', 'm2HT');

            // 2T Probs
            const xH_2T = data.xfH * (1-data.pH);
            const xV_2T = data.xfV * (1-data.pV);
            renderSectionProbs(xH_2T, xV_2T, 'mO05_2T', 'm1_2T', 'mX_2T', 'm2_2T');

            // Tables
            const t15 = document.getElementById('mTable15'); t15.innerHTML = "";
            ["0-15","16-30","31-45","46-60","61-75","76-90"].forEach((l, i) => {
                t15.appendChild(createRangeRow(l, data.xfH * (data.segH[i]/100), data.xfV * (data.segV[i]/100)));
            });

            const t30 = document.getElementById('mTable30'); t30.innerHTML = "";
            const r30 = [{l:"0-30", i:[0,1]}, {l:"16-45", i:[1,2]}, {l:"46-75", i:[3,4]}, {l:"61-90", i:[4,5]}];
            r30.forEach(r => {
                const pH = r.i.reduce((acc, c) => acc + data.segH[c], 0)/100;
                const pV = r.i.reduce((acc, c) => acc + data.segV[c], 0)/100;
                t30.appendChild(createRangeRow(r.l, data.xfH * pH, data.xfV * pV));
            });

            document.getElementById('probModal').classList.add('active');
        }

        function renderSectionProbs(xh, xv, idO, id1, idX, id2) {
            const lambda = xh + xv;
            document.getElementById(idO).innerText = ((1 - poisson(0, lambda)) * 100).toFixed(1) + "%";
            let pW = 0, pD = 0, pL = 0;
            for (let i = 0; i <= 4; i++) { for (let j = 0; j <= 4; j++) {
                const p = poisson(i, xh) * poisson(j, xv);
                if (i > j) pW += p; else if (i === j) pD += p; else pL += p;
            }}
            document.getElementById(id1).innerText = (pW * 100).toFixed(0) + "%";
            document.getElementById(idX).innerText = (pD * 100).toFixed(0) + "%";
            document.getElementById(id2).innerText = (pL * 100).toFixed(0) + "%";
        }

        function createRangeRow(label, xh, xv) {
            const lambda = xh + xv;
            const prob = (1 - poisson(0, lambda)) * 100;
            let c = "text-white"; if (prob >= 70) c = "prob-green"; else if (prob >= 60) c = "prob-yellow"; else if (prob >= 50) c = "prob-red";
            let pW = 0, pD = 0, pL = 0;
            for (let i = 0; i <= 3; i++) { for (let j = 0; j <= 3; j++) {
                const p = poisson(i, xh) * poisson(j, xv);
                if (i > j) pW += p; else if (i === j) pD += p; else pL += p;
            }}
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${label}</td><td>${lambda.toFixed(2)}</td><td class="${c}">${prob.toFixed(1)}%</td><td>${(pW*100).toFixed(0)}%</td><td>${(pD*100).toFixed(0)}%</td><td>${(pL*100).toFixed(0)}%</td>`;
            return tr;
        }

        function closeModal(e) { document.getElementById('probModal').classList.remove('active'); }

        // --- FUNCIONES DE PROCESAMIENTO (ACTUALIZADAS CON CLICK) ---
        function processMatches() {
            const input = document.getElementById('rawInput').value;
            if (!input.trim()) return;
            const lines = input.split('\n');
            const organized = {};
            let currentDetectedLeague = null;
            for (let i = 0; i < lines.length; i++) {
                const rawLine = lines[i];
                const cleanLine = rawLine.split('\t').map(p => p.trim()).filter(p => p !== "");
                if (cleanLine.length === 0) continue;
                if (rawLine.toLowerCase().includes("stats") && !rawLine.includes(":") && cleanLine.length <= 3) {
                    currentDetectedLeague = cleanLine[0].replace(/\d+$/, '').trim();
                    continue;
                }
                if (cleanLine.includes("Scope") || cleanLine.includes("PPG")) continue;
                const timeIndex = cleanLine.findIndex(p => p.includes(':') && p.length <= 5);
                if (timeIndex !== -1) {
                    const time = cleanLine[timeIndex];
                    const home = cleanLine[0] === time ? cleanLine[1] : cleanLine[0];
                    let away = "Por definir";
                    if (i + 1 < lines.length) {
                        const nextLine = lines[i + 1].split('\t').map(p => p.trim()).filter(p => p !== "");
                        if (nextLine.length > 0 && !nextLine.some(p => p.includes(':'))) { away = nextLine[0]; i++; }
                    }
                    let leagueName = currentDetectedLeague || detectLeague(home, away);
                    leagueName = normalizeLeagueName(leagueName, home, away);
                    if (!organized[leagueName]) organized[leagueName] = [];
                    organized[leagueName].push({ time, home, away });
                } 
            }
            localStorage.setItem('betags_daily_matches', JSON.stringify(organized));
            renderMatches(organized);
            document.getElementById('rawInput').value = ""; 
        }

        function renderMatches(organized) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";
            const sortedLeagues = Object.keys(organized).sort((a, b) => (LEAGUE_PRIORITY[a] || 99) - (LEAGUE_PRIORITY[b] || 99));
            sortedLeagues.forEach(league => {
                const section = document.createElement('div');
                section.className = "glass-card rounded-xl overflow-hidden mb-4";
                let html = `<div class="league-header px-4 py-2 font-bold text-cyan-300 uppercase tracking-tighter">${league}</div><div class="divide-y divide-slate-700/50">`;
                organized[league].sort((a, b) => a.time.localeCompare(b.time)).forEach(m => {
                    html += `
                        <div onclick="openQuickAnalysis('${league}', '${m.home}', '${m.away}')" class="px-4 py-3 flex items-center justify-between hover:bg-cyan-500/10 cursor-pointer transition-colors group">
                            <span class="text-slate-500 font-mono w-12 group-hover:text-cyan-400">${m.time}</span>
                            <div class="flex-1 flex justify-center items-center gap-4 text-sm">
                                <span class="font-semibold text-right flex-1">${m.home}</span>
                                <span class="text-[8px] bg-slate-800 px-1 rounded text-slate-500 group-hover:bg-cyan-500 group-hover:text-black">VS</span>
                                <span class="font-semibold text-left flex-1">${m.away}</span>
                            </div>
                        </div>`;
                });
                section.innerHTML = html + `</div>`;
                container.appendChild(section);
            });
        }

        function normalizeLeagueName(detected, h, v) {
            const d = detected.toUpperCase();
            if (d.includes("NATIONS") || d.includes("WC QUALIFICATION")) return "Amistosos Internacionales / Nations";
            if (d.includes("LALIGA2") || d.includes("SPAIN 2")) return "España - LaLiga 2";
            if (d.includes("COLOMBIA")) return "Colombia - Primera / Ascenso";
            if (d.includes("BRAZIL")) return "Brasil - Serie A / B / Paulista";
            if (d.includes("PARAGUAY")) return "Paraguay - Primera División";
            if (d.includes("URUGUAY")) return "Uruguay - Primera / Segunda";
            if (d.includes("WOMEN")) return "Femenil / Women's League";
            if (d.includes("U21") || d.includes("U23") || d.includes("DEVELOPMENT")) return "Juveniles / Development League";
            return detected;
        }

        function detectLeague(h, v) {
            const names = (h + " " + v).toUpperCase();
            if (names.includes("U21") || names.includes("U23")) return "Juveniles / Development League";
            if (names.includes(" W") || names.includes("WOMEN")) return "Femenil / Women's League";
            const countries = ["LATVIA", "GIBRALTAR", "LUXEMBOURG", "MALTA", "BOSNIA", "ITALY", "CZECH", "DENMARK", "KOSOVO", "TURKEY", "SWEDEN", "POLAND"];
            if (countries.some(c => names.includes(c))) return "Amistosos Internacionales / Nations";
            const col = ["ORSOMARSO", "MILLONARIOS", "FORTALEZA CEIF", "BARRANQUILLA", "ENVIGADO", "CALI", "BOCA JUNIORS", "REAL SANTANDER", "TIGRES"];
            if (col.some(c => names.includes(c))) return "Colombia - Primera / Ascenso";
            const uru = ["PROGRESO", "LIVERPOOL M.", "DEFENSOR", "ALBION", "MALDONADO"];
            if (uru.some(c => names.includes(c))) return "Uruguay - Primera / Segunda";
            const esp = ["MIRANDES", "ALBACETE", "DEPORTIVO", "CORDOBA", "VALLADOLID"];
            if (esp.some(c => names.includes(c))) return "España - LaLiga 2";
            const bra = ["CRUZEIRO", "PALMEIRAS", "FLAMENGO", "JUVENTUDE", "NOVORIZONTINO"];
            if (bra.some(c => names.includes(c))) return "Brasil - Serie A / B / Paulista";
            return "Otras Ligas / Copa";
        }

        function clearMatches() {
            if (confirm("¿Limpiar historial?")) { localStorage.removeItem('betags_daily_matches'); document.getElementById('resultsContainer').innerHTML = ""; }
        }
    </script>
</body>
</html>
